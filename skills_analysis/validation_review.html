nd maintain web content and other public documents pertaining to in-person voting. This position provides in-person administration assistance, which includes statute and process clarification and materials creation and review. The work involves keeping informed of all laws, rules and regulations in North Carolina that apply to in-person voting, communicating this to the county boards of elections, and providing the necessary materials and supervision needed to conduct successful elections in North Carolina. Responsibilities will also include directing a program assistant, as well as a small group of seasonal temporary employees to carry out program standards and objectives. The employee will work with all federal, state and local agencies to assure all standards are met and in-person voting reports and surveys are completed. Salary: $46,203-$59,240. Deadline: May 8. Application: For the complete job listing and to apply, click here ", "best_text": "Election Program Specialist, NC State Board of Elections— the In-Person Voting Program Specialist has extensive knowledge of election administration and performs detailed planning and preparation for conducting in-person person in all 100 North Carolina counties in compliance with General Statute 163. In-person voting includes one-stop early voting and Election Day for all primaries, second primaries, recounts, special elections, and general elections. In-person voting programs include but are not limited to voting inside the polling place, curbside voting, provisional voting, precinct officials, and electioneering. This position will work closely with agency legal counsel, Project Management section, Training & Outreach section, and other SBE and CBE stakeholders to review election law and make necessary recommendations in election processes, procedures, and information systems pertaining to in-person voting. Collaborates with Communications Division to develop and maintain web content and other public documents pertaining to in-person voting. This position provides in-person administration assistance, which includes statute and process clarification and materials creation and review. The work involves keeping informed of all laws, rules and regulations in North Carolina that apply to in-person voting, communicating this to the county boards of elections, and providing the necessary materials and supervision needed to conduct successful elections in North Carolina. Responsibilities will also include directing a program assistant, as well as a small group of seasonal temporary employees to carry out program standards and objectives. The employee will work with all federal, state and local agencies to assure all standards are met and in-person voting reports and surveys are completed. Salary: $46,203-$59,240. Deadline: May 8. Application: For the complete job listing and to apply, click here", "skill_categories_required": "", "skill_categories_preferred": "", "skill_categories_mentioned": "ops|legal|comms|pm|personnel|intergovt", "election_security_explicit": false, "degree_required": "", "degree_field": "", "min_years_experience": "", "experience_can_substitute": "", "certifications_required": "", "certifications_preferred": "", "certifications_substitutable": "", "link": "http://agency.governmentjobs.com/northcarolina/job_bulletin.cfm?JobID=2770215", "reviewer_verdict": "", "reviewer_notes": "", "flagged_fields": ""}, {"review_id": 14, "row_id": 927, "sample_type": "stratified", "edge_case_type": "", "year": 2020, "era": "2019-2022", "date": "9-Apr", "job_title": "Grants Specialist", "employer": "U.S. Election Assistance Commission", "state": "", "job_classification": "not_election_official", "classification_confidence": "high", "position_elected": false, "full_time": "", "remote_hybrid": "", "registered_voters": "", "text_used": "full_text", "text_confidence": "high", "skill_count": 6, "salary_low_end": 69581.0, "salary_high_end": 128920.0, "pay_basis": "yearly", "description": "Grants Specialist, U.S. Election Assistance Commission— The Grants Specialist will assist the Grants Director to manage and administer the grants program for the EAC pursuant to 5 USC §3109 (See 42 USC §15324(b)) and §204 (6)(c) of HAVA. The incumbent provides expert advice to EAC leadership regarding grants management; provides advice and guidance to States and U.S. territories regarding the use of funds provided by EAC to ensure State/U.S. territory compliance with HAVA, Appropriations Law and Office of Management and Budget (OMB) circulars; conducts pre- and post-audits to review how funds have been spent; and makes recommendations to the Executive Director for audit resolutions. Salary: $69,581 to $128,920 per year.  Deadline: June 17. Application: For the complete job listing and to apply, click here.", "best_text": "The Grants Specialist will assist the Grants Director to manage and administer the grants program for the EAC pursuant to 5 USC §3109 (See 42 USC §15324(b)) and §204 (6)(c) of HAVA.\nSummary\nThe Grants Specialist will assist the Grants Director to manage and administer the grants program for the EAC pursuant to 5 USC §3109 (See 42 USC §15324(b)) and §204 (6)(c) of HAVA.\nThe incumbent provides expert advice to EAC leadership regarding grants management; provides advice and guidance to States and U.S. territories regarding the use of funds provided by EAC to ensure State/U.S. territory compliance with HAVA, Appropriations Law and Office of Management and Budget (OMB) circulars; conducts pre- and post-audits to review how funds have been spent; and makes recommendations to the Executive Director for audit resolutions.\nMajor Duties\nThe incumbent provides expertise for EAC on matters related to grants management oversight, audit resolution, budget formulation, and strategic planning. Activities may include:\nSupporting the EAC in the development of Congressional budget justifications;\nDeveloping short-term goals and objectives for the grants management program and participating in long-term strategic planning with EAC leadership;\nProviding technical assistance to the states on administering Federal funds and the allowable usage of HAVA funds;\nProcessing and disbursing payments to States and discretionary grant recipients;\nResearching options for awarding remaining grant funds;\nTracking the submission of and reviewing the content of financial and performance reports submitted by States and discretionary grant recipients;\nPre-audit site visits to grantees to provide technical assistance and prepare for future audits;\nProviding post-audit visits, reviewing audit reports (related to payments and equipment inventory), and working with fund recipients on recommendations to resolve audit findings applicable to EAC programs;\nOverseeing the process of negotiating the indirect cost rates;\nReviewing and approving amended State Plan submissions;\nGrants close-out management;\nWriting guidance (e.g., policies and internal controls) on grants management and HAVA issues;\nProviding written monthly/quarterly reports of activities associated with grants management and oversight;\nManaging contracts related to grants program activities; and\nCandidates must meet all qualifications prior to the closing date of this announcement.\nQualifications\nCOMPETENCIES\nIn-depth knowledge of HAVA, Appropriations Law, OMB circulars and EAC's Grants Management Handbook sufficient to provide expert guidance and advice to others regarding the expenditure of funds, conduct reviews to ensure compliance with Federal laws, regulations and guidance; and identify resolutions based on review findings.\nKnowledge of grants management in order to serve as expert, strategic advisor on issues pertaining to EAC's grants management program.\nKnowledge of information gathering and analysis techniques to gather, analyze, summarize, and report on audit findings.\nAbility to effectively defend policies, internal controls, or points of view in the face of heavy criticism in unstructured settings with internal and external stakeholders (e.g., Inspector General; State officials; and local election officials).\nInterpersonal Effectiveness: Skill in responding appropriately to a diversity of groups and individuals in a variety of challenging situations. Demonstrated ability to be tactful and to treat others with respect. Skill in developing networks, achieving cooperation, and collaborating with others when appropriate, including parties outside of EAC.\nWritten and Oral Communication: Demonstrated ability to clearly, succinctly and convincingly express facts and ideas both in writing and orally. Skill in listening and appropriately responding to the ideas, points of view, or concerns of others.\nOrganizational Skill: Demonstrated understanding of priorities, deadlines, administrative systems and resources needed to gather and synthesize information while balancing workload demands.\nExternal Awareness: Skill in identifying and keeping abreast of legislation, policies and economic, political, and social trends that affect the EAC.\nSkill in building coalitions and in communicating to explain, advocate and negotiate with individual and groups internally and externally. Ability to develop an expansive professional network with other organizations, to represent and speak for the Agency and organization, and to gain understanding and support from senior management.\nAbility to establish program/policy goals and the structure and processes necessary to implement the organization's strategic vision and mission, to ensure that programs and policies are being implemented and adjusted as necessary, that the appropriate results are being achieved, and that a process for continually assessing the quality of the program activities is in place.\nEducation\nThis job does not have an education qualification requirement.\nAdditional information\nYou must submit all required information by the closing date. If materials are not received, your application will be evaluated solely on the information available and you may not receive full consideration or may not be considered eligible. The materials you send with your application will not be returned.\nSend only those materials needed to evaluate your application.\nIf you use public transportation, part of your transportation costs may be subsidized.\nAll applicants MUST submit applications via email: resumes@eac.gov.\nYou MUST include the job title and announcement number in the subject line of the email. You do not need to submit your application package through the USAJOBS process.\nYour application package must be received by the closing date of the announcement and must include the following:\nA resume;\nFor current or former federal employees, you must submit a copy of your last Notification of Personnel Action (SF50) showing your position, title, series, grade and eligibility; and\nA copy of your most recent performance appraisal. If you do not have a recent performance appraisal, please explain why you do not have one.\nAll applicants MUST submit applications via email: resumes@eac.gov.\nYou MUST include the job title and announcement number in the subject line of the email. You do not need to submit your application package through the USAJOBS process.\nYour application package must be received by the closing date of the announcement and must include the following:\nA resume;\nFor current or former federal employees, you must submit a copy of your last Notification of Personnel Action (SF50) showing your position, title, series, grade and eligibility; and\nA copy of your most recent performance appraisal. If you do not have a recent performance appraisal, please explain why you do not have one.", "skill_categories_required": "budget|legal|intergovt|comms|data", "skill_categories_preferred": "", "skill_categories_mentioned": "budget|legal|intergovt|comms|data|pm", "election_security_explicit": false, "degree_required": "", "degree_field": "", "min_years_experience": "", "experience_can_substitute": "", "certifications_required": "", "certifications_preferred": "", "certifications_substitutable": "", "link": "https://www.usajobs.gov/GetJob/ViewDetails/554680700", "reviewer_verdict": "", "reviewer_notes": "", "flagged_fields": ""}, {"review_id": 15, "row_id": 986, "sample_type": "stratified", "edge_case_type": "", "year": 2020, "era": "2019-2022", "date": "24-Sep", "job_title": "Elections Administrator", "employer": "Harris County", "state": "Texas", "job_classification": "top_election_official", "classification_confidence": "high", "position_elected": false, "full_time": true, "remote_hybrid": "on_site", "registered_voters": "", "text_used": "full_text", "text_confidence": "high", "skill_count": 9, "salary_low_end": "", "salary_high_end": "", "pay_basis": "", "description": "Elections Administrator, Harris County, Texas— Harris County seeks an Elections Administrator to plan, coordinate, lead, and manage the newly established Office of the Elections Administrator under Chapter 31 of the Texas Election Code. The Elections Administrator will act as the county voter registrar, administer all local, state, and federal elections in Harris County, and oversee Harris County’s elections operations, including voter registration, public education and outreach, and recruitment and supervision of election judges and poll workers. The Elections Administrator will also work to modernize Harris County elections, expand access to registration and voting, and ensure voting is fair, easy, efficient, secure, and accessible for all eligible Harris County voters consistent with the Texas Election Code and Federal regulations. Deadline: Oct. 5. Application: For the complete job listing and to apply, click here.", "best_text": "=== JOB DETAILS ===\n\nSalary: Depends on Qualifications\nLocation: Houston, TX\nJob Type: Regular Full-time\nJob Number: 0005-D\nOpening Date: 08/21/2020\nClosing Date: 11/9/2020 9:47 AM Central\n\nBENEFITS:\n  • Medical\n  • Dental\n  • Vision\n  • Wellness\n  • Life Insurance\n  • Long-term disability\n  • Employee Assistance Program\n  • 10 days of vacation each year for the first five (5) years of service. Accrual rates increase based on years of service.\n  • 10 county holidays plus one (1) floating holiday\n  • Professional development opportunities\n  • Dependent Care Reimbursement Plan\n  • Healthcare Reimbursement Account\n  • 457 Deferred Compensation Plan\n\nThe following benefits are also available to regular (full-time) employment and may be available to part-time employees:\nRetirement pension (TCDRS)\t\t\t Flexible schedules (varies by department)\t\t\t\t\tTransportation Assistance (Metro RideSponsor Program)\nIn accordance with the Harris County Personnel Regulations, Group Health and related benefits are subject to amendment or discontinuance at any time. Commissioners Court reserves the right to make benefit modifications on the County's behalf as needed.\nFor plan details, visit the Harris County benefits website:\nhttps://hrrm.harriscountytx.gov/Pages/Medical.aspx\n\n=== JOB DESCRIPTION ===\n\nHarris County seeks an Elections Administrator to plan, coordinate, lead, and manage the newly established Office of the Elections Administrator under Chapter 31 of the Texas Election Code. The Elections Administrator will act as the county voter registrar, administer all local, state, and federal elections in Harris County, and oversee Harris County’s elections operations, including voter registration, public education and outreach, and recruitment and supervision of election judges and poll workers. The Elections Administrator will also work to modernize Harris County elections, expand access to registration and voting, and ensure voting is fair, easy, efficient, secure, and accessible for all eligible Harris County voters consistent with the Texas Election Code and Federal regulations.\n\nOVERVIEW OF HARRIS COUNTY\n \nHarris County is the third-largest county in the country. Its population of more than 4.5 million rivals that of the entire state of Colorado. Harris County is governed by Harris County Commissioners Court. The Court is composed of a County Judge and four Commissioners. Commissioners Court conducts the general business of the County and oversees financial matters. The Harris County Judge and Commissioners oversee a $4.3 billion budget that helps fund key county services and institutions. As the main governing body of Harris County, Commissioners Court plays a critical role that is part administrative, part legislative, and part judicial. Its many responsibilities include adopting a budget; setting tax rates; calling for bond elections; building and maintaining county infrastructure such as roads and bridges; and overseeing county courthouses, jails, libraries, parks, and the Harris County Flood Control District. Harris County currently has more than 75 departments with over 15,000 employees. The Harris County Election Commission appoints and oversees the Elections Administrator. \n\n\nESSENTIAL DUTIES AND RESPONSIBILITIES\n \nOversees and coordinates Harris County's election and voter registration activities and operations, including by conducting ongoing registration of Harris County voters.\nMonitors and ensures compliance with state and federal laws and regulations governing elections and voters' rights, including the Voting Rights Act of 1965 and the American Disabilities Act.\nConducts and expands public education and outreach on voter registration and election participation.\nDevelops and implements protections and initiatives to modernize Harris County elections, expand access to registration and voting in Harris County, and otherwise ensure registration and voting processes are fair, easy, convenient, and accessible for all eligible Harris County citizens.\nCoordinates with elections judges and workers, as well as local organizations and citizens, to enable all eligible citizens to be properly registered and informed on voting processes and procedures.\nWorks with political parties in Harris County to coordinate primary elections\nReviews voter registration records and monitor voter registration activities in compliance with state and federal laws.\nAssembles, trains, and supervises teams of election judges and workers in performing all elections for which Harris County is responsible.\nGathers and provides information to the Harris County Election Commission, Harris County Commissioners Court, election judges, election workers, and the general public regarding the state and federal laws and procedures for registering voters and conducting elections.\nIdentifies and designates all facilities/locations for each election event and ensure an equitable distribution of voting locations across county precincts.\nProvides to each voting location the required equipment, forms, records, maps, and other materials needed to conduct the election and report election results.\nPrepares and administers the annual budget for approval by Commissioners Court and monitor expenditures for the Office of the Elections Administrator.\nAudits and submits all authorizations for payments for election workers, services, and equipment according to Harris County purchasing requirements.\nCompiles election results for reporting to the Commissioners Court, the Secretary of State, or any jurisdictional authority with which Harris County contracts to provide election services.\nMaintains records of election results and make them available as a public record as required by law.\nMeets regularly with the Election Administration Community Advisory Board, and regularly engage with community stakeholders regarding the elections process.\nDevelops and implements a robust community engagement plan to ensure public participation throughout the election administration process.\nDevelops and implements an election administration plan by using data and metrics, and in collaboration with community members and stakeholders.\nOversees general management and human resources responsibilities for the Office of the Election Administrator.\n \nHarris County is an Equal Opportunity Employer\nhttps://hrrm.harriscountytx.gov/Pages/EqualEmploymentOpportunityPlan.aspx\nIf you need special services or accommodations, please call (713) 274-5445 or email ADACoordinator@bmd.hctx.net\n\nMinimum 4 years of experience in relevant positions with increasing levels of responsibility.\nExcellent oral and written communications skills, management, supervisory, and organizational skills.\nPer the Texas Election Code, may not be a candidate for a public office or an office of a political party, hold public office, or hold an office of or a position in a political party.\nAbility to work with Party Chairs in recruiting, training and supervising election workers.\nMust be able to exercise tact and courtesy in frequent contact with various county personnel, public officials and the general public.\nProven ability to meet multiple deadlines and balance numerous projects in a fast-paced environment.\nAbility to develop and drive new initiatives, work cross-departmentally, work within multidisciplinary teams, oversee projects to completion, and measure results.\nDeep commitment to expanding voting rights, voting integrity, and voter accessibility\n\n\nSTATE REQUIREMENTS\n\nPer Chapter 31 of the Texas Election Code:\nSec. 31.034: To be eligible for appointment as county elections administrator, a person must be a qualified voter of the state.\nSec. 31.035.\n(a) A county elections administrator may not be a candidate for a public office or an office of a political party, hold a public office, or hold an office of or position in a political party.  At the time an administrator becomes a candidate or accepts an office or position in violation of this subsection, the administrator vacates the position of administrator.\n(b) A county elections administrator commits an offense if the administrator makes a political contribution or political expenditure, as defined by the law regulating political funds and campaigns, or publicly supports or opposes a candidate for public office or a measure to be voted on at an election.  An offense under this subsection is a Class A misdemeanor.  On a final conviction, the administrator's employment is terminated, and the person convicted is ineligible for future appointment as county elections administrator.\n(c) In this section, \"candidate\" means a person who has taken affirmative action, as described by the law regulating political funds and campaigns, for the purpose of gaining nomination or election.\nSec. 31.036. The county election commission is the proper authority to receive and act on a resignation from the position of county elections administrator.\nSec. 31.037. The employment of the county elections administrator may be suspended, with or without pay, or terminated at any time for good and sufficient cause on the four-fifths vote of the county election commission and approval of that action by a majority vote of the commissioners court.\nSec. 31.038.\n(a) A vacancy in the position of county elections administrator is filled by appointment of the county election commission.\n(b) An appointment to fill an anticipated vacancy arising from a resignation to take effect at a future date may be made at any time after the resignation is accepted.\nSec. 31.039. \n(a) The commissioners court shall set the number of deputies and other persons that the county elections administrator may employ.\n(b) Repealed by Acts 2005, 79th Leg., Ch. 1272, Sec. 1, eff. June 18, 2005.\n(c) The commissioners court may allow the automobile expense that it considers necessary to the administrator and to any of the administrator's employees in the performance of their official duties.\n(d) The commissioners court shall provide the administrator with suitable office space and with the equipment and operating expenses needed for the proper conduct of the office.\n(e) The amount initially appropriated by the commissioners court for the operating expenses of the administrator's office may not be less than the total amount last appropriated to the county clerk and the county tax assessor-collector for the functions assigned to the administrator.\n(f) Except as provided by Subsection (g), a person employed on a full-time basis by the administrator's office is subject to Section 31.035 in the same manner as the administrator.\n(g)  Section 31.035(b) does not apply to a person employed on a full-time basis by the administrator's office in a county with a population of one million or less that has an election administrator.\n\nAdditional relevant experience over 8 years.\nHaving worked on jurisdiction of comparable size\nBachelor’s degree or above in a relevant field\nPrior experience related to or knowledge of elections and voter registration laws, procedures, practices, documentation, and equipment.\nKnowledge of regulations, principles, and practices governing elections administration and voter registration.\nFamiliarity with specialized elections equipment and database programming principles.\n\nWORKING CONDITIONS\nThis position will require extended work during elections and meetings across Harris County outside normal business hours. During election cycles, extended and irregular hours during the workweek and weekend may be required.\n\nSALARY\nCommensurate with experience.\n\nTO APPLY\nPlease send a cover letter and resume to hcrecruit@bmd.hctx.net \n \n\nDue to a high volume of applications positions may close prior to the advertised closing date.", "skill_categories_required": "ops|vr|legal|personnel|budget|comms|intergovt", "skill_categories_preferred": "data|pm", "skill_categories_mentioned": "pm|legal|ops|data|intergovt|budget|personnel|vr|comms", "election_security_explicit": true, "degree_required": "", "degree_field": "", "min_years_experience": 4.0, "experience_can_substitute": "", "certifications_required": "", "certifications_preferred": "", "certifications_substitutable": "", "link": "https://www.governmentjobs.com/careers/harriscountytx/jobs/2843813/elections-administrator?department%5b0%5d=Harris%20County%20Office%20of%20the%20Elections%20Administrator&sort=PositionTitle%7CAscending&pagetype=jobOpportunitiesJobs", "reviewer_verdict": "", "reviewer_notes": "", "flagged_fields": ""}, {"review_id": 16, "row_id": 860, "sample_type": "stratified", "edge_case_type": "", "year": 2021, "era": "2019-2022", "date": "2-Dec", "job_title": "Elections Mapping Analyst", "employer": "Arapahoe County", "state": "Colorado", "job_classification": "election_official", "classification_confidence": "high", "position_elected": false, "full_time": true, "remote_hybrid": "hybrid", "registered_voters": "", "text_used": "full_text", "text_confidence": "high", "skill_count": 8, "salary_low_end": 53164.8, "salary_high_end": 79726.4, "pay_basis": "hourly", "description": "Elections Mapping Analyst, Arapahoe County, Colorado— The Election Mapping Analyst is responsible for the maintenance of the entire SCORE address library and GIS system ArcGIS, as well as collecting data to make various geographic decisions. This position will review and redraw precincts and districts as necessary and according to Federal and State requirements. The Election Mapping Analyst supports Leadership with election data analysis, visualization projects, and various operational projects relating to the operations of Elections. Salary: $2,044.80 – $3,066.40 Biweekly. Deadline: December 3. Application: For the complete job listing and to apply, click here.", "best_text": "=== JOB DETAILS ===\n\nTitle: Elections Mapping Analyst\nSalary: $25.56 - $38.33 HOUR\nLocation: 80120, CO, CO, 80120\nEmployer: Arapahoe County\nEmployment Type: FULL_TIME\nDate Posted: 2021-11-11\nJob Type: Full-time\nJob Number: 04577\nDepartment: Clerk and Recorder's Office\nDivision: Elections\nOpening Date: 11/12/2021\nClosing Date: 12/3/2021 11:59 PM Mountain\n\nBENEFITS:\n  • Medical, Dental, and Vision Insurance\n  • Life and Supplemental Life Insurance\n  • Short and Long Term Disability\n  • Mandatory Pension Plan\n  • Deferred Compensation Plan\n  • Pre-paid Legal Services\n  • Vacation and Sick Leaves\n  • Holiday pay\n  • Training and Educational Reimbursement Opportunities\n\nFor a more detailed listing of our benefit programs, click on the MENU link on the left and then Benefits Summary.\n\n=== JOB DESCRIPTION ===\n\nThe Election Mapping Analyst is responsible for the maintenance of the entire SCORE address library and GIS system ArcGIS, as well as collecting data to make various geographic decisions. This position will review and redraw precincts and districts as necessary and according to Federal and State requirements. The Election Mapping Analyst supports Leadership with election data analysis, visualization projects, and various operational projects relating to the operations of Elections.\n\n**This position is eligible for remote/hybrid work as defined by department guidelines. \n\nThe following duty statements are illustrative of the essential functions of the job and do not include other non-essential or marginal duties that may be required. The County reserves the right to modify or change the duties or essential functions of the job at any time. \n \n• Manages the daily operation of maintaining the boundaries of Arapahoe County’s 400+ special districts, school districts, and municipalities\n• Ensures statutory compliance of voter service functions including voter registration, SCORE address library maintenance, and any and all services relevant to the voter mapping/location operation\n• Conducts long-range planning studies on mapping and address library issues and recommends projects, programs, and procedures to achieve operational objectives\n• Technical expert of County Assessor software (Aumentum), County Recording software (County Fusion), County Election software (SCORE), County mapping software (ARAPAmap), County Data visualization software (Power BI), statutes, rules and regulations pertaining to updating existing County boundaries\n• Political map subject matter expert, preparing and maintaining precinct and district maps for use by County, political parties, districts and candidates.\n• Serves as the project manager for decennial re-districting (additional re-precinting projects when necessary), including staffing advisory commissions for redrawing of the Board of County Commissioner district lines and coordinating with cities and school districts in the county who adjust their candidate district lines.\n• Develops and manages election data reporting and analytics tools that support elections operations internally and provide information to voters and interested parties through ArapahoeVotes.com\n• Supports Election Deputy Director with maps and visualization of past election data (such as turnout) together with analysis of proposals for future services such as vote centers and ballot drop boxes.\n• Works with County and State partners to prepare voter lists and other data reports for custom orders and for posting on website for public use at regular intervals.\n• Acts as point of contact with various internal and external agencies including the Secretary of State’s office, Election software and hardware vendors, Colorado County Clerk’s Associations, political organizations, municipal governments, school districts, and other election coordinating entities.\n• Works with team members to understand needs and options to develop technical implementation plans to support during election and post-election analysis, presentation, and explanation of voting data/reports to and the public.\n• Ensures programs and projects keep to schedules and are accomplished within budget projections and relevant performance measures.\n\n\n\n\n\n\n\nSkills, Abilities and Competencies:\n• Team focused; able to function collaboratively and make decisions and recommendations from a team perspective and focus\n• Thorough knowledge of state statutes, rules, regulations, procedures and forms applicable to the operation of the Voter Service team.\n• Communication skills, both oral and written, which enable courteous and diplomatic interactions with the public, vendors, staff, and other County divisions.\n• Ability to grasp complex and widely varied issues quickly, develop plans to implement actions to address the issues, and be able to communicate those issues in a clear, concise manner to management, staff, entities, and vendors.\n• Shows initiative, a self-starter and works independently.\n• Ability to provide guidance and direction to staff, delegate work, and set expectations for temporary staff during election time\n\nBehavioral Competencies (these are required for all positions at ACG):\nAccountability\nAccessibility\nInclusivity\nIntegrity\n\nEducation and Experience:\n• Associate’s Degree in related field\n• 3 years Mapping/Geographic Information System (GIS) experience, data analysis or related experience\n• Any equivalent combination of education and work experience that satisfy the requirements of the job will be considered.\n\nPreferred Education and Experience:\n• Bachelors’ degree\n• Elections/Voter Services experience\n\nPre-Employment Additional Requirements:\n• Must successfully pass pre-employment testing which includes an acceptable motor vehicle record (MVR) and background check.\n• Possession of a valid Class “R” Colorado Driver’s License or the ability to obtain one within two weeks of appointment.\n\n\n \n\nWORK ENVIRONMENT:\n• Work is generally confined to a standard office environment.\n\nPHYSICAL DEMANDS:\nThe following are some of the physical demands commonly associated with this position.\n• Spends 80% of the time sitting and 20% of the time either standing or walking.\n• Occasionally lifts, carries, pulls or pushes up to 20 lbs.\n• Occasionally uses cart, dolly, or other equipment to carry in excess of 20 lbs.\n• Occasionally climbs, stoops, kneels, balances, reaches, crawls and crouches while performing office or work duties.\n• Verbal and auditory capacity enabling constant interpersonal communication through automated devices, such as telephones, radios, and similar; and in public meetings and personal interactions.\n• Constant use of eye, hand and finger coordination enabling the use of automated office machinery or equipment.\n• Visual capacity enabling constant use of computer or other work-related equipment.\n\n \n\n* Arapahoe County does not discriminate on the basis of race, color, religion, national origin, sex, age, disability, genetic information, sexual orientation or any other status protected under the law. It is our intention that all qualified applicants be given equal opportunity in any term, condition, or privilege of employment and that selection decisions are based on job-related factors. Arapahoe County is committed to making employment accessible to persons with disabilities.\n\n** In accordance with Senate Bill 23-058, applicants understand that Arapahoe County will not request or require the applicant to include their age, date of birth, or date of attendance/graduation date on the initial application. Applicants understand that Arapahoe County can request or require an individual to provide documentation including copies of certification, transcripts, and other materials created by a third party. The applicant understands that the applicant can redact, if they so choose, information that identifies age, date of birth, or dates of attendance/graduation from an educational institution on those requested/required certification, transcripts and other materials created by a third party. \n\nToll Free Applicant Technical Support:  If you experience technical difficulty with the NEOGOV system (i.e. uploading or attaching documents to your online application), call NEOGOV technical support at 855-524-5627.  Helpful hints: if you are having difficulty uploading or attaching documents to your application, first, ensure your documents are PDF or Microsoft Word files, and second, close the document before you attempt uploading (attaching) it. \n\nAs a Regular Full-Time employee at Arapahoe County Government, you are eligible for benefits such as:\tMedical, Dental, and Vision Insurance\tLife and Supplemental Life Insurance\tShort and Long Term Disability\tMandatory Pension Plan\tDeferred Compensation Plan\tPre-paid Legal Services\tVacation and Sick Leaves\tHoliday pay\tTraining and Educational Reimbursement OpportunitiesFor a more detailed listing of our benefit programs, click on the MENU link on the left and then Benefits Summary.\n\n\n                            \n    \n        \n\n01\n\n    \n\n    \n        Please choose the response that best describes your educational background.\n        \n        \n                Some high school courses\n                High School Graduate or GED\n                Some college courses\n                Associate Degree\n                Associate Degree in Political Science, public/business administration, Technology or a related field\n                Bachelor's Degree\n                Bachelor's Degree in Political Science, public/business administration, Technology or a related field\n                Master's Degree\n                Master's Degree in Political Science, public/business administration, Technology or a related field\n        \n    \n\n\n    \n        \n\n02\n\n    \n\n    \n        Please choose the response that best describes you years of mapping-related experience.\n        \n        \n                No experience\n                Less than one year of experience\n                One year but less than two years of experience\n                Two years but less than three years of experience\n                Three years but less than four years of experience\n                Over four years of experience\n        \n    \n\n\n ": "", "experience_can_substitute": "", "certifications_required": "", "certifications_preferred": "", "certifications_substitutable": "", "link": "https://ertd.fa.us2.oraclecloud.com/hcmUI/CandidateExperience/en/sites/CX_1001/requisitions/preview/22699/?keyword=administrative+services", "reviewer_verdict": "", "reviewer_notes": "", "flagged_fields": ""}, {"review_id": 21, "row_id": 712, "sample_type": "edge_case", "edge_case_type": "full_text_spot_check", "year": 2022, "era": "2019-2022", "date": "16-Jun", "job_title": "Elections Technician or Elections Specialist", "employer": "Larimer County Clerk & Recorder", "state": "Colorado", "job_classification": "election_official", "classification_confidence": "high", "position_elected": false, "full_time": true, "remote_hybrid": "on_site", "registered_voters": 250000.0, "text_used": "full_text", "text_confidence": "high", "skill_count": 7, "salary_low_end": 46030.4, "salary_high_end": 60777.6, "pay_basis": "hourly", "description": "Elections Technician or Elections Specialist DOQ, Larimer county, Colorado— The Larimer County Clerk & Recorder Elections division offers an outstanding opportunity for an exciting career in the always engaging field of Election Administration – where the foundation of government begins for our citizens! We are seeking skilled Elections Technicians/Elections Specialists to join our highly respected team. We serve a population of more than 300,000 citizens, of which more than 250,000 are registered voters. We embrace innovative processes and have a shown reputation for integrity. If you are a self-motivated, positive teammate who thrives in a fast-paced professional environment – we want to hear from you! The successful candidate will be dedicated, assertive, and possess outstanding interpersonal and problem-solving skills. The Elections Technician/Elections Specialist position provides support to and/or oversight for certain processes. Deadline: June 26. Application: For the complete job listing and to apply, click here.", "best_text": "=== JOB DETAILS ===\n\nTitle: Elections Technician or Elections Specialist DOQ\nSalary: $22.13 - $29.22 HOUR\nLocation: FC 200 W Oak, CO\nEmployer: Larimer County\nEmployment Type: OTHER\nDate Posted: 2022-06-09\nJob Type: Regular\nJob Number: 202200336\nDepartment: Clerk and Recorder\nOpening Date: 06/10/2022\nClosing Date: 6/26/2022 11:59 PM Mountain\nFull/Part Time: Full Time\n\nBENEFITS:\n  • Medical, Dental, and Vision Benefits.\n  • Flexible Spending Accounts / Health Savings Account\n  • Short and Long Term Disability.\n  • Employee Assistance Program\n  • Basic Life/Accidental Death & Dismemberment\n  • Accident Insurance\n  • Critical Illness Insurance\n  • Retirement Plan 401(a) with employer match.\n  • 457(b) Deferred Compensation.\n  • Paid time off including vacation, sick and holidays.\n\nClick here\nto view information on Larimer County's Benefits.\n\n=== JOB DESCRIPTION ===\n\nThe Larimer County Clerk & Recorder Elections division offers an outstanding opportunity for an exciting career in the always engaging field of Election Administration – where the foundation of government begins for our citizens!\n\nWe are seeking skilled Elections Technicians/Elections Specialists to join our highly respected team. We serve a population of more than 300,000 citizens, of which more than 250,000 are registered voters. We embrace innovative processes and have a shown reputation for integrity.\n\nIf you are a self-motivated, positive teammate who thrives in a fast-paced professional environment – we want to hear from you! The successful candidate will be dedicated, assertive, and possess outstanding interpersonal and problem-solving skills. The Elections Technician/Elections Specialist position provides support to and/or oversight for certain processes.\n\nSpecifically, this position:\n\n\nAssists with incoming and outbound mail processing, customer support, revenue handling, and customer transactions.\nProvides Voter Registration support services, including entering Voter Registration forms and other data transactions accurately and completely.\nReviews and updates Elections Office procedures yearly or as needed.\nMonitors, analyze, and explain Election statutes and rules, including statutes and rules proposed by the Colorado State Legislature and the Colorado Department of State.\nIn addition to year-round daily tasks, support one or more of the following, Election Cycle process areas:\n\nCoordinates with local entities to sign Intergovernmental Agreements, receive certified ballot content, and layout ballot artwork in the Election Management System.\nRecruits, trains, and handles temporary employees (Election Judges) for job assignments at Voter Service and Polling Centers (VSPC) and at the Central Count facility.\nOrganizes and prepares outgoing mail ballot materials. Collaborate with print/mail vendor and United States Postal Service to achieve timely transmission and delivery of ballots to eligible voters.\nSupports VSPC operations, including set-up, operation, and break-down of all VSPC locations, intense daily support for 500+ VSPC Election Judges, and end-of-day reconciliation.\nOversees the receipt, processing, verification, and tabulation of mail ballots in the counting facility. Provide direct supervision for 150+ Central Count Election Judges.\nEnsures integrity of all Election process areas through enforcement of strict security, the chain of custody, and bipartisanship requirements.\nTo view the full job descriptions, visit https://www.larimer.org/hr/careers/job-descriptions.\n\nWe are looking for a candidate that will:\nHave knowledge of general office practices and procedures. Along with the ability to use routine software and business application including, word processing, spreadsheets, presentation software, and databases.\nCommunicate clearly and concisely, both verbally and in writing.\nRead and comprehend department and County rules, regulations, policies, standard operating procedures, and elections statutes and rules.\nBe dependable and have regular, predictable attendance.\nMulti-task with contending priorities and responsibilities while having the ability to work in a stressful, fast-paced, deadline-driven environment.\nWork collaboratively with others from a diverse group of backgrounds in teams to ensure a successful project outcome.\nProblem solve and troubleshoot complex systems.\nHave supervisory, training, and project management experience.\n\nAll candidates will be screened for the following required minimum qualifications. Any candidate who does not meet all of the qualifications listed as required for an Elections Technician will be eliminated from the process. \n\nDepending on qualifications this position may be hired as Elections Technician or Elections Specialist. \n\nElections Technician \n\n\nTwo (2) years of office experience or in the performance of similar duties required.\nHigh School Diploma or GED required.\nPossession of, or ability to obtain, voter's registration in the State of Colorado within one (1) month of hire, is required.\nPossession of a valid Driver's License by date of hire is required.\nPossession of, or ability to obtain, within one (1) year, Colorado State Election Certification and/or maintain continuing education hours annually or as required.\nMust be available to work evenings, weekends, and some holidays.\nElections Specialist \n\nTwo (2) years of Elections experience required.\nQualify via the Elections Department scoring rubric for classification as an Elections Specialist.\nHigh School Diploma or GED required.\nPossession of, or ability to obtain, voter's registration in the State of Colorado within one (1) month of hire, required.\nPossession of a valid Driver's License by date of hire required.\nPossession of, or ability to obtain, within one (1) year, Colorado State Election Certification and/or maintain continuing education hours annually or as required.\nMust be available to work evenings, weekends, and some holidays.\n\nBenefits\nFor all temporary positions, sick leave and our Employee Assistance Program are available and other benefits may be available.\n\nLarimer County offers the following for all Regular/Limited Term positions:\nMedical, Dental, and Vision Benefits.\nFlexible Spending Accounts / Health Savings Account\nShort and Long Term Disability.\nEmployee Assistance Program\nBasic Life/Accidental Death & Dismemberment\nAccident Insurance\nCritical Illness Insurance\nRetirement Plan 401(a) with employer match.\n457(b) Deferred Compensation.\nPaid time off including vacation, sick and holidays.\nTo view information on Larimer County's Benefits, visit https://www.larimer.org/hr/benefits.  \n\nTypical schedule during non-election times 8:00 am - 5:00 pm Monday to Friday.\nDuring the Election Cycle availability to work nights, weekends, and some holidays is required. \n\n\n\nAn offer of employment is contingent upon the successful completion of a pre-employment drug screen and background check. As marijuana is an illegal substance under federal law, testing positive for marijuana (medical or otherwise) or any other substance for which the county tests, will result in the contingent offer of employment being revoked. Successful completion of the drug screen is defined as obtaining a negative result.\n\nAll application components must be submitted by 11:59 PM MT on the closing date listed.\n\nLarimer County is an Equal Opportunity Employer, and prohibits discrimination and harassment in all employment practices on the basis of race, color, religion, sex (including pregnancy, gender identity or expression, and sexual orientation), national origin, marital status, disability, genetic information, age, military status, or any other characteristic protected by law or regulation.", "skill_categories_required": "ops|vr|data|personnel|intergovt", "skill_categories_preferred": "pm|legal", "skill_categories_mentioned": "ops|vr|legal ministration, along with publishing legal notices, ordinances, and resolutions, as required by law. The City Clerk also receives, and processes subpoenas, prepares, and coordinates responses to public records requests, prepares and certifies Certificates of Residency (pensioners), and administers the Oath of Office. The City is seeking a collaborative, organized, and highly motivated individual to serve as the next City Clerk. The ideal candidate will bring record-keeping experience, problem solving capabilities, and a proven track record of exercising confidentiality. An honest, ethical, and technically savvy team builder who is cooperative and flexible is essential. The incoming City Clerk should be adaptable and politically astute, promoting a culture of transparency and integrity. Salary: $99,756 to $125,028. Deadline: March 24. Application: For the complete job listing and to apply, click here. ", "best_text": "The City of Palos Verdes Estates is a 4.75 square mile city in southern California, offering beautiful ocean and hillside views, urban forest, and recreational opportunities. With approximately 13,500 residents, the City is known for being a planned community with tranquil neighborhoods and is the oldest of four cities on the Palos Verdes Peninsula. Residents enjoy magnificent views of the Los Angeles Basin and Pacific Ocean, low density, rural character, preserved open space, low crime, and excellent schools. The Office of the City Clerk is responsible for coordination and preparation of City Council meeting agendas and back-up materials, maintenance of the Municipal Code, and election administration, along with publishing legal notices, ordinances, and resolutions, as required by law. The City Clerk also receives, and processes subpoenas, prepares, and coordinates responses to public records requests, prepares and certifies Certificates of Residency (pensioners), and administers the Oath of Office. The City is seeking a collaborative, organized, and highly motivated individual to serve as the next City Clerk. The ideal candidate will bring record-keeping experience, problem solving capabilities, and a proven track record of exercising confidentiality. An honest, ethical, and technically savvy team builder who is cooperative and flexible is essential. The incoming City Clerk should be adaptable and politically astute, promoting a culture of transparency and integrity.\nQualified candidates possess the equivalent to a Bachelor’s degree from an accredited college or university with significant coursework in the areas of Business Administration, Public Administration, or related fields, along with at least five (5) years of increasingly responsible and complex administrative experience in a clerk’s office and two (2) years in a lead or supervisory role. Prior experience as a City Clerk along with possession of a Notary Public Certification is desired. Candidates should also possess a valid California Driver’s License, and a Certified Municipal Clerk designation.\nThe annual salary range for the City Clerk is $99,756 to $125,028 per year. Placement within this range is dependent on experience and qualifications. The City also offers an excellent benefits package.", "skill_categories_required": "ops|legal|personnel", "skill_categories_preferred": "", "skill_categories_mentioned": "ops|legal|personnel|data", "election_security_explicit": false, "degree_required": "bachelor", "degree_field": "Business Administration, Public Administration, or related fields", "min_years_experience": 5.0, "experience_can_substitute": "", "certifications_required": "Certified Municipal Clerk", "certifications_preferred": "Notary Public", "certifications_substitutable": "", "link": "https://www.bobmurrayassoc.com/search-summary?broc_id=6024", "reviewer_verdict": "", "reviewer_notes": "", "flagged_fields": ""}, {"review_id": 27, "row_id": 94, "sample_type": "stratified", "edge_case_type": "", "year": 2025, "era": "2023-2025", "date": "27-Feb", "job_title": "Campaign Finance Analyst", "employer": "Michigan Department of State", "state": "Michigan", "job_classification": "election_official", "classification_confidence": "high", "position_elected": false, "full_time": true, "remote_hybrid": "", "registered_voters": "", "text_used": "full_text", "text_confidence": "high", "skill_count": 3, "salary_low_end": 53768.0, "salary_high_end": 84260.8, "pay_basis": "hourly", "description": "Campaign Finance Analyst, Michigan Dept. of State– This position serves as the Campaign Finance Analyst with the Filing, Disclosure, and Compliance Division within the Bureau of Elections, Michigan Department of State. The Division is responsible for administering the Michigan Campaign Finance Act, Lobby Registration Act, Casino Registration Act and Michigan Election Law. The Analyst will support the Division’s functions through research and analysis of disclosure reports, campaign statements and ballot-access filings, with emphasis on working cooperatively to address deficiencies and correct noncompliant filings; developing and updating training materials and user manuals; and providing training to the regulated community. Salary: $2,008.00 – $3,146.40 Biweekly. Deadline: March 5. Application: For the complete job listing and to apply, click here. ", "best_text": "=== JOB DETAILS ===\n\nTitle: Departmental Analyst 9-P11 - Campaign Finance Analyst\nSalary: $25.85 - $40.51 HOUR\nLocation: Lansing, MI, MI, 48909\nEmployer: State of Michigan\nEmployment Type: OTHER\nDate Posted: 2025-06-25\nJob Type: Permanent Full Time\nJob Number: 2301-25-BOE055\nDepartment: Department of State\nOpening Date: 06/26/2025\nClosing Date: 7/6/2025 11:59 PM Eastern\nBargaining Unit: NON-EXCLUSIVE REPRESENTED EMPLOYEE (NERE)\n\n=== JOB DESCRIPTION ===\n\n\n\n\nPOSITION DUTIES - These positions help provide the public with valuable information regarding who is funding campaigns for state offices including the legislature, executive branch, judges and political action committees. These analyst positions make sure candidates and donors adhere to the Michigan Campaign Finance Act and Michigan Election Law. The Analysts will support the Campaigns to address deficiencies and correct noncompliant filings, analyze reports for accuracy and completeness, and notify campaigns of errors, late filing fees and other enforcement actions.  These positions will assist in updating training materials and user manuals and providing training to the regulated community.\n\nPosition Description - Campaign Finance Analyst 9-P11 (Download PDF reader)\n \n\nAPPOINTMENT TYPE/BENEFITS - This position is Full-Time. Therefore, you would be eligible to participate in the benefits offered by the state.\n\nMDOSJOBS\n\nEducation\nPossession of a bachelor's degree in any major.\n\nExperience \n\nDepartmental Analyst 9\nNo specific type or amount is required.\n\nDepartmental Analyst 10\nOne year of professional experience.\n\nDepartmental Analyst P11\nTwo years of professional experience, including one year of experience equivalent to the intermediate (10) level in state service.\n\nAlternative Education and Experience\n\nEducational level typically acquired through completion of high school and the equivalent of at least two years of full-time\nactive-duty experience at or above the E-6 level in the uniformed services may be substituted for the education requirement.\n\nAccommodations\nIf you require a reasonable accommodation to participate in the application or selection processes, please contact the ADA coordinator (Download PDF reader) for the agency that posted this position vacancy.\n\n\n                            \n    \n        \n\n01\n\n    \n\n    \n        DEPTALT - Do you possess one of the following?  \n\nA bachelor's degree or higher in any major.  If so, you must attach a copy of your official college transcripts.\n\nOR\n\nA high school education and the equivalent of at least two years of full-time active-duty experience at or above the E-6 level in the uniformed services.\n        \n        \n                Yes\n                No\n        \n    \n\n\n    \n        \n\n02\n\n    \n\n    \n        Are you related to anyone currently working at the Department of State (Secretary of State)?\n        \n        \n                Yes\n                No\n        \n    \n\n\n    \n        \n\n03\n\n    \n\n    \n        If you answered \"yes\" to question #2, please list the name of each relative. If you answered \"no\" to question #2, please enter \"none\".\n        \n        \n        \n    \n\n\n    \n        \n\n04\n\n    \n\n    \n        Please list all previous names, to include name at birth, and any alias name(s) used. If you do not have any previous/alias names to list, please enter \"none\".\n        \n        \n        \n    \n\n\n    \n        \n\n05\n\n    \n\n    \n        How many years of experience do you have with research, data analysis, or compliance related work? Experience must be substantiated in your application materials.\n        \n        \n                None\n                Less than 1 year\n                1 year - 3 years\n                3 years - 5 years\n                More than 5 years\n        \n    \n\n\n    \n        \n\n06\n\n    \n\n    \n        if you have experience with research, data analysis, or compliance related work, briefly describe your experience. If you do not possess this experience, please enter \"none\".\n        \n        \n        \n    \n\n\n    \n        \n\n07\n\n    \n\n    \n        How many years of experience do you have working in an elections-related, regulatory, or compliance environment? Experience must be substantiated in your application materials.\n        \n        \n                None\n                Less than 1 year\n                1 year - 3 years\n                3 years - 5 years\n                More than 5 years\n        \n    \n\n\n    \n        \n\n08\n\n    \n\n    \n        If you have experience working in an elections-related, regulatory, or compliance environment, briefly describe your experience.  If you do not possess this experience, please enter \"none\".\n        \n        \n        \n    \n\n\n    \n        \n\n09\n\n    \n\n    \n        How many years of experience do you have interpreting laws, administrative rules, or policy to ensure compliance? Experience must be substantiated in your application materials.\n        \n        \n                None\n                Less than 1 year\n                1 year - 3 years\n                3 years - 5 years\n                More than 5 years\n        \n    \n\n\n    \n        \n\n10\n\n    \n\n    \n        if you have experience interpreting laws, administrative rules, or policies to ensure compliance, briefly describe your experience. If you do not possess this experience, please enter \"none\".\n        \n        \n        \n    \n\n\n    \n        \n\n11\n\n    \n\n    \n        How many years of experience do you have in campaign finance reporting or similar work? Experience must be substantiated in your application materials.\n        \n        \n                None\n                Less than 1 year\n                1 year - 3 years\n                3 years - 5 years\n                More than 5 years\n        \n    \n\n\n    \n        \n\n12\n\n    \n\n    \n        If you have experience in campaign finance reporting or similar work, briefly describe your experience. If you do not possess this experience, please enter \"none\".\n        \n        \n        \n    \n\n\n    \n        \n\n13\n\n    \n\n    \n        Do you have experience creating and delivering training materials such as webinars, guides, or user manuals? Experience must be substantiated in your application materials.\n        \n        \n                Yes\n                No\n        \n    \n\n\n    \n        \n\n14\n\n    \n\n    \n        If you have experience creating and delivering training materials such as webinars, guides, or user manuals, briefly describe your experience. If you do not possess this experience, please enter \"none\".\n        \n        \n        \n    \n\n\n    \n        \n\n15\n\n    \n\n    \n        From the following options, please select your employment status.\n        \n        \n                Currently employed at the Department of State (Secretary of State)\n                Previously employed by the Department of State (Secretary of State)\n                Currently employed at another State of Michigan agency\n                Previously employed by another State of Michigan agency\n                None of the above\n        \n    \n\n\n    \n        \n\n16\n\n    \n\n    \n        Did you remember to attach your resume, cover letter, and a copy of your official college transcripts?  Failure to do so may result in your application being screened out of the hiring process. \n        \n        \n                Yes\n                No\n        \n    \n\n\n    \n        \n\n17\n\n    \n\n    \n        Please select from the options below: (Please note, actions that have been expunged, formal counseling, and layoff actions need not be reported.) Failure to answer this question honestly may result in being sanctioned from employment with MDOS. Please select all that apply.\n        \n        \n                I have been dismissed within the last two years\n                I have resigned in lieu of discipline or dismissal within the last two years\n                I have been suspended without pay within the last two years\n                I have received an unsatisfactory rating in the last two years\n                I have received a written reprimand within the last two years\n                I have signed a last chance agreement with MDOS within the last two years\n                I certify that none of the above circumstances apply to me\n        \n    \n\n\n    \n        \n\n18\n\n    \n\n    \n        Due to the nature of this position, the Michigan Department of State conducts comprehensive background checks that will require the candidate to be subjected to, and not limited by, criminal history review, drug testing, and reference checks. Do you accept and comply to these background check requirements?\n        \n        \n                Yes\n                No\n        \n    \n\n\n    \n        \n\n19\n\n    \n\n    \n        All listed supervisors/employers may be contacted for reference checks. If your NEOGOV application indicates that they cannot be contacted, please document the reason in the work experience box of the NEOGOV application, under the \"reasons for leaving\" box(es). You will then need to provide the names, phone numbers and relationship (i.e.. Former Team Lead) of two to three professionals below.\n\nIf you have indicated that all listed supervisors/employers may be contacted, please enter \"none\".\n        \n        \n        \n    \n\n\n                                \n                                     Required Question", "skill_categories_required": "legal|data", "skill_categories_preferred": "", "skill_categories_mentioned": "legal|data|comms", "election_security_explicit": false, "degree_required": "bachelor", "degree_field": "", "min_years_experience": 2.0, "experience_can_substitute": true, "certifications_required": "", "certifications_preferred": "", "certifications_substitutable": "", "link": "https://www.governmentjobs.com/careers/michigan/jobs/4842379/departmental-analyst-9-p11-campaign-finance-analyst?keywords=mdosjobs&pagetype=jobOpportunitiesJobs", "reviewer_verdict": "", "reviewer_notes": "", "flagged_fields": ""}, {"review_id": 28, "row_id": 153, "sample_type": "stratified", "edge_case_type": "", "year": 2025, "era": "2023-2025", "date": "17-Apr", "job_title": "Election Services Supervisor", "employer": "County of Sonoma", "state": "California", "job_classification": "election_official", "classification_confidence": "high", "position_elected": false, "full_time": true, "remote_hybrid": "on_site", "registered_voters": "", "text_used": "full_text", "text_confidence": "high", "skill_count": 8, "salary_low_end": 81439.42, "salary_high_end": 98992.1, "pay_basis": "yearly", "description": "Election Services Supervisor, Sonoma County, California– Within the Registrar of Voters, this Election Services Supervisor (Voter Registration) collaborates with the elections management team to ensure proper elections procedures are followed by staff, and provides supervision, training, and support to elections operations. They develop and implement elections office procedures to enhance efficiency and identify opportunities for improving voter services and the overall election experience. Additional responsibilities include: Ensuring compliance with election deadlines, policies, and procedures; Monitoring critical election process timelines and ensuring that staff are meeting deadlines; Supervising voter registration staff including assigning tasks, coaching staff, managing workloads and evaluating staff performance; Training seasonal, extra-help staff during critical junctures of election cycles; Managing voter registration and ensuring compliance with applicable regulations; and Assisting with gathering information for Public Records Act (PRA) requests. The ideal candidate will have a passion for election administration and voter engagement, and an understanding of election codes and laws related to elections with related research experience. Salary: $81,439.42 – $98,992.10 Deadline: April 22. Application: For the complete job listing and to apply, click here. ", "best_text": "=== JOB DETAILS ===\n\nTitle: Election Services Supervisor\nSalary: $81,439.42 - $98,992.10 YEAR\nLocation: Santa Rosa, CA, CA, 95403\nEmployer: County of Sonoma (CA)\nEmployment Type: FULL_TIME\nDate Posted: 2025-04-08\nJob Type: Full-Time\nJob Number: 25/04-0267-O\nDepartment: Clerk-Recorder-Assessor (CRA)\nDivision: CCLK - Registrar of Voters (1930)\nOpening Date: 04/08/2025\nClosing Date: 6/9/2025 5:00 PM Pacific\nBargaining Unit: 95\n\n=== JOB DESCRIPTION ===\n\n\n\n\nDo you have supervisory experience and a background in election operations? \nThe County of Sonoma Registrar of Voters is hiring an Election Services Supervisor - Apply Today!\n\n\n\n\n\n\nStarting salary up to $47.43/hour ($98,992/year) plus a competitive total compensation package!*\n\nWhat We Offer\n\nWorking at the County of Sonoma offers expansive opportunities for growth and development, the ability to be a part of a challenging and rewarding work environment, and the satisfaction of knowing you're working to better our communities. You can also look forward to flexible work arrangements and excellent benefits* including:\n\n\nSalary Advancement - A salary increase after 1,040 hours (6 months when working full-time) for good work performance; eligibility for a salary increase for good performance every year thereafter, until reaching the top of the salary range\nPaid Time Off - Competitive vacation and sick leave accruals, 12 paid holidays, and an additional 8 floating holiday hours per year\nCounty Paid Health Premium Contributions - 100% premium contribution for the majority of employee-only and employee + family health plan options\nStaff Development/Wellness Pay - Annual benefit allowances of up to $500 and ongoing education/training opportunities\nPost-Retirement Health Reimbursement Arrangement - County contributions to help fund post-retirement employee health insurance/benefits\nRetirement - A pension fully integrated with Social Security\nPaid Parental Leave - May be eligible for up to 8 weeks (320 hours) after 12 months of County employment\nStudent Loan Debt Relief – County employees may be eligible for Public Service Loan Forgiveness through the U.S. Department of Education\n\nThe Registrar of Voters\n\nWithin the Registrar of Voters, this Election Services Supervisor (Voter Registration) collaborates with the elections management team to ensure proper elections procedures are followed by staff, and provides supervision, training, and support to elections operations. They develop and implement elections office procedures to enhance efficiency and identify opportunities for improving voter services and the overall election experience. Additional responsibilities include:\n\n\nEnsuring compliance with election deadlines, policies, and procedures.\nMonitoring critical election process timelines and ensuring that staff are meeting deadlines\nSupervising voter registration staff including assigning tasks, coaching staff, managing workloads and evaluating staff performance\nTraining seasonal, extra-help staff during critical junctures of election cycles\nManaging voter registration and ensuring compliance with applicable regulations\nAssisting with gathering information for Public Records Act (PRA) requests\n\nThe ideal candidate will have a passion for election administration and voter engagement, and an understanding of election codes and laws related to elections with related research experience. They will be an energetic, enthusiastic, collaborative leader and will possess many of the following:\n\n\nExcellent verbal and written communication skills, including strong proofreading abilities\nSupervisory experience, which includes hiring, onboarding, training, and the ability to effectively mentor staff and manage performance and/or disciplinary processes\nThe ability to work independently and the willingness to ask questions to ensure comprehension\nStrong research skills to stay informed about changes in election laws and best practices\nStrong customer service skills in a fast-paced working environment and skilled in conflict resolution and de-escalation techniques\nAdaptable to changing priorities in a high-pressure environment during election time\nProficiency in Microsoft Office (Word, Excel, Outlook)\n\n*Salary is negotiable within the established range. Benefits described herein do not represent a contract and may be changed without notice. Additional information can be found in the Service Employees International Union Local 1021 Memorandum Of Understanding (SEIU MOU) and our Employee Benefits directory.\n\nThis recruitment is being conducted to fill an Election Services Supervisor position in the Registrar of Voters. This employment list may also be used to fill future full-time, part-time, or extra-help (temporary) positions as they occur during the active status of the list. County employees who wish to be considered for future positions should consider applying to this recruitment. \n\n\n\n\n\n\n\nAPPLICATION SUBMISSIONS REQUIRE THE SUPPLEMENTAL QUESTIONNAIRE BE COMPLETED.\n\nExperience: Any combination of work experience and training which would provide an opportunity to acquire the knowledge and abilities listed. Normally, four years of increasingly responsible office support work, which includes substantial customer service including one year as a lead worker in an office environment, would provide this opportunity. One year working in an election environment is highly desirable.\n\nEducation: Any combination of education and training which would provide the opportunity to acquire the knowledge and abilities listed. Normally, formal course work or training in such areas as law and legal documents, management information systems, or electronic data processing is desirable.\n\nLicense: Possession of a valid driver’s license at the appropriate level including necessary special endorsements, as required by the State of California to perform the essential job functions of the position.\n\nThorough knowledge of: the California Elections and Government Codes, as well as other applicable laws and ordinances, as they pertain to the conduct of elections and the registration of voters.\n\nConsiderable knowledge of: modern office methods and procedures; written and oral communication, including language mechanics, syntax and English composition.\n\nWorking knowledge of: the principles of supervision, training and instructional methods and techniques; work flow and data collection needs of the Registrar of Voter’s Office; the efficient filing and records management concepts as they relate to both manual and data processing systems; the use of electronic information equipment and specific systems as used within the department.\n\nAbility to: understand, interpret, and apply rules, regulations, ordinances, and state and federal legislation; plan and organize research and statistical work relating to the various aspects of administration and general management matters; effectively communicate orally and in writing, and present conclusions before advisory and policy bodies; effectively supervise the work of technical and clerical employees; carry out departmental policies and procedures; establish and maintain under extensive pressure effective working relationships with staff, election officials and with the public; operate election-related computer equipment and run elections software; understand and follow written and oral instructions; analyze situations and make logical conclusions; compare and check names and numbers accurately and quickly; make arithmetic calculations; use a variety of office equipment such as typewriters, calculators, and personal computers; safely lift and move heavy and bulky objects; maintain accurate records, inventories, files and indexes; prepare reports and correspondence; work long and irregular hours and weekends as assigned.\n\nYour application information and your responses to the supplemental questions are evaluated and taken into consideration throughout the entire selection process.\nYou should list all employers and positions held within the last ten years in the work history section of your application. Be as thorough as possible when responding to the supplemental questions.\nYou may include history beyond ten years if related to the position for which you are applying. If you held multiple positions with one employer, list out each position separately.\nFailure to follow these instructions may impact your competitiveness in this process or may result in disqualification.\nPlease visit Getting a Job with the County of Sonoma to review more detailed information about the hiring process, including the application process, examination steps, and department selection process.\n\n\nAPPLICATION SUBMISSIONS REQUIRE THE SUPPLEMENTAL QUESTIONNAIRE BE COMPLETED.\n\n\nResponses to supplemental questions will be scored using position-specific criteria. Please provide specific and detailed responses of a reasonable length to allow for a thorough assessment of your qualifications. Responses that state \"See Resume\" or \"See Application\" may be considered insufficient and therefore may not be scored.\n\nThe selection procedure will consist of the following examination:\n\n\n\nAn Application & Supplemental Questionnaire Appraisal Examination (weight 100%). Each application and supplemental questionnaire will be thoroughly evaluated for satisfaction of minimum qualifications and relevance of educational coursework, training, experience, knowledge, and abilities that relate to this position. Candidates possessing the most appropriate job-related qualifications will be placed on an employment list and referred to the department for selection interviews.\n\n\n\n\nADDITIONAL INFORMATION\n\n\n\n\nA background investigation is required prior to employment. Candidates referred to departments for a selection interview are typically required to sign authorization and release forms enabling such an investigation. Failure to sign prescribed forms will result in the candidate not being considered further for that vacancy. Reference information will not be made available to applicants.\n\n\n\n\nAdditional requirements, such as successful completion of a physical exam, drug screen, etc., may apply, depending on the duties and responsibilities of the position. If you receive a conditional job offer for the position, the requirements upon which the offer is contingent will be outlined in the conditional job letter. You may also review theJob Classification Screening Scheduleto determine the requirements for this position.\n\nHOW TO APPLY\n\nApplications are accepted online atwww.yourpath2sonomacounty.org. Paper applications may be submitted by person, fax (707-565-3770), email, or through the mail. All applications and appropriate supplemental information as outlined in the job bulletin must be RECEIVED by the time and date specified on the first page of this job announcement. Continuous recruitments may close without notice at any time that a sufficient number of qualified applications have been received. Applications received after the recruitment closes will not be accepted.\n\nThe County of Sonoma values diversity and is dedicated to creating a workplace environment that provides individuals with a sense of belonging. We are committed to having a diverse workforce that is representative of the communities we serve. The County is proud to be an Equal Opportunity Employer where all aspects of employment are based on merit, competence, performance, and business need.\n\n\n\nHR Analyst: JT\nHR Technician: KK\n\nIMPORTANT NOTE: Benefits described herein do not apply to Extra Help positions.COUNTY OF SONOMA BENEFITS: GENERAL*These are some of the excellent benefits the County offers: Paid Time Off: Competitive vacation and sick leave accruals; 12 paid holidays, and an additional 8 floating holiday hours per year; and may be eligible for up to 8 weeks (320 hours) of Paid Parental Leave after 12 months of County employment. Health Plan: Choose from nine health plans (three HMOs, three deductible HMOs, and three HSA-qualifying plans) with a generous County contribution to the premium (the contribution amount varies by bargaining unit). For more information, please see the appropriate MOU.Retirement: Fully integrated with Social Security. For more informa   {key:'ops',       label:'Election Operations & Administration'},
  {key:'vr',        label:'Voter Registration Systems'},
