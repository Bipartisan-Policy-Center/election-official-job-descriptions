const STORAGE_KEY = 'validation_state';

function persistState() {
  const serializable = {};
  Object.entries(state).forEach(([id, s]) => {
    serializable[id] = { verdict: s.verdict, notes: s.notes, flags: [...s.flags] };
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(serializable));
}

const state = {};
const _saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
DATA.forEach(r => {
  const saved = _saved[r.row_id];
  state[r.row_id] = {
    verdict: saved ? saved.verdict : (r.reviewer_verdict || ''),
    notes:   saved ? saved.notes   : (r.reviewer_notes   || ''),
    flags:   new Set(saved ? saved.flags : (r.flagged_fields||'').split('|').filter(Boolean))
  };
});

let filtered = DATA.map((_,i)=>i);
let pos = 0;
const row = () => DATA[filtered[pos]];

function applyFilter() {
  const f = document.getElementById('filtSel').value;
  filtered = DATA.map((_,i)=>i).filter(i => {
    const v = state[DATA[i].row_id].verdict;
    if (f==='all')  return true;
    if (f==='todo') return !v;
    return v===f;
  });
  pos=0; render(false); populateJump();
}
function populateJump() {
  const icons = {correct:'✓', slightly_off:'~', way_off:'✗'};
  document.getElementById('jumpSel').innerHTML = filtered.map((i,p) => {
    const r=DATA[i], v=state[r.row_id].verdict;
    return `<option value="${p}">${v?icons[v]:'·'} #${r.review_id} · ${r.year} · ${(r.job_title||'').slice(0,30)}</option>`;
  }).join('');
  document.getElementById('jumpSel').value = pos;
}
function jumpTo(p)   { pos=parseInt(p); render(false); }
function navigate(d) {
  const np=pos+d; if(np<0||np>=filtered.length) return;
  pos=np; render(false); document.getElementById('jumpSel').value=pos;
}

function saveScrolls() {
  return {
    right: document.getElementById('rightPane')?.scrollTop || 0,
    stub:  document.getElementById('stubText')?.scrollTop  || 0,
    full:  document.getElementById('fullText')?.scrollTop  || 0,
  };
}
function restoreScrolls(saved) {
  requestAnimationFrame(() => {
    const r=document.getElementById('rightPane'), s=document.getElementById('stubText'), f=document.getElementById('fullText');
    if(r) r.scrollTop=saved.right;
    if(s) s.scrollTop=saved.stub;
    if(f) f.scrollTop=saved.full;
  });
}

function toggleFlag(rowId, key) {
  const saved=saveScrolls(), s=state[rowId];
  if(s.flags.has(key)) {
    s.flags.delete(key);
    if(s.flags.size===0 && s.verdict==='slightly_off') s.verdict='correct';
  } else {
    s.flags.add(key);
    if(!s.verdict||s.verdict==='correct') s.verdict='slightly_off';
  }
  persistState(); updateStats(); populateJump(); render(true); restoreScrolls(saved);
}
function setVerdict(rowId, v) {
  const saved=saveScrolls(); state[rowId].verdict=v;
  persistState(); updateStats(); populateJump(); render(true); restoreScrolls(saved);
}
function setNotes(rowId, txt) { state[rowId].notes=txt; persistState(); }

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtSalary(val) {
  if(val===''||val===null||val===undefined) return '';
  const n=parseFloat(val); return isNaN(n)?String(val):'$'+Math.round(n).toLocaleString('en-US');
}
function chip(rowId, fieldKey, rawValue, emptyLabel) {
  const isEmpty=(rawValue===''||rawValue===null||rawValue===undefined);
  const display=isEmpty?(emptyLabel||'not extracted'):esc(rawValue);
  const isFlagged=state[rowId].flags.has(fieldKey);
  const cls=isEmpty?`chip no-value${isFlagged?' flagged':''}`:`chip has-value${isFlagged?' flagged':''}`;
  const title=isEmpty?(isFlagged?'Flagged as missing — click to unflag':'Click to flag as missing'):(isFlagged?'Flagged as incorrect — click to unflag':'Click to flag as incorrect');
  return `<span class="${cls}" onclick="toggleFlag(${rowId},'${fieldKey}')" title="${title}">${display}</span>`;
}
function boolChip(rowId,key,value){
  const d=(value===true||value==='True'||value==='true')?'Yes':(value===false||value==='False'||value==='false')?'No':'';
  return chip(rowId,key,d);
}
function parseSkills(raw){ return new Set((raw||'').split('|').map(s=>s.trim()).filter(Boolean)); }

function renderSkillsMatrix(r) {
  const req=parseSkills(r.skill_categories_required), pref=parseSkills(r.skill_categories_preferred), ment=parseSkills(r.skill_categories_mentioned);
  const flags=state[r.row_id].flags;
  const cols=[{key:'required',set:req},{key:'preferred',set:pref},{key:'mentioned',set:ment}];
  const rows=ALL_SKILLS.map(sk=>{
    const cells=cols.map(col=>{
      const modelSaid=col.set.has(sk.key);
      const fpKey=`skill_${sk.key}_${col.key}_fp`, fnKey=`skill_${sk.key}_${col.key}_fn`;
      const isFP=flags.has(fpKey), isFN=flags.has(fnKey);
      let cls,label,flagKey,title;
      if(modelSaid){ cls=isFP?'sc sc-fp':'sc sc-yes'; label=isFP?'✗':'✓'; flagKey=fpKey; title=isFP?'Flagged as wrong — click to unflag':'Click to flag as incorrect'; }
      else          { cls=isFN?'sc sc-fn':'sc sc-no';  label=isFN?'+':'—';  flagKey=fnKey; title=isFN?'Flagged as missed — click to unflag':'Click to flag as missed'; }
      return `<td style="text-align:center"><span class="${cls}" onclick="toggleFlag(${r.row_id},'${flagKey}')" title="${title}">${label}</span></td>`;
    }).join('');
    return `<tr><td class="td-name">${sk.label}</td>${cells}</tr>`;
  }).join('');
  return `<table class="skill-table"><thead><tr><th class="th-name"></th><th>Required</th><th>Preferred</th><th>Mentioned</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function render(preserveScroll) {
  const r=row(), s=state[r.row_id];
  document.getElementById('navPos').textContent=(pos+1)+' / '+filtered.length;
  document.getElementById('prevBtn').disabled=pos===0;

  const confClass=r.text_confidence==='medium'?'medium':r.text_confidence==='low'?'low':'';

  const salLow=chip(r.row_id,'salary_low_end',fmtSalary(r.salary_low_end));
  const salHigh=chip(r.row_id,'salary_high_end',fmtSalary(r.salary_high_end));
  const salBasis=chip(r.row_id,'pay_basis',r.pay_basis);
  const salHtml=`<div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">${salLow}<span style="color:#ccc;font-size:11px">–</span>${salHigh}</div>`;

  const btsDisplay=r.text_used||'stub';

  const secChip=`<span class="chip has-value${secFlagged?' flagged':''}" onclick="toggleFlag(${r.row_id},'election_security_explicit')" title="${secFlagged?'Flagged — click to unflag':'Click to flag as incorrect'}">${secVal?'Yes — election security explicitly mentioned':'No'}</span>`;

  const Q=(lbl,key,val)=>`<div class="mk">${lbl}</div><div class="mv">${chip(r.row_id,key,val)}</div>`;

  // Left pane: full text when available (no truncation), stub expands to fill if only content
  const hasFull=(r.text_used==='full_text');
  const leftPane=hasFull?`
    <div class="pane-lbl">Electionline stub</div>
    <div class="text-box split-stub" id="stubText">${esc(r.description||'')}</div>

  `:`
    <div class="pane-lbl">Electionline stub <span class="best-tag">Best text source</span></div>
    <div class="text-box grow" id="stubText">${esc(r.description||'')}</div>
    <div class="no-full">${r.full_text_file?'Full text available but model chose stub as more reliable.':'No full text available for this posting.'}</div>
  `;

  const nFlags=s.flags.size;
  const flagNote=nFlags>0?`<div class="flag-count">${nFlags} field${nFlags>1?'s':''} flagged</div>`:'';

  document.getElementById('mainCard').innerHTML=`
    <div class="card-head">
      <div class="cid">#${r.review_id}</div>
      <div class="card-meta">
        <h2>${esc(r.job_title||'(untitled)')}</h2>
        <div class="sub">${esc(r.employer||'')}${r.state?' · '+r.state:''} · ${r.year}</div>
        ${edgeNote}
      </div>
    </div>

    <div class="panes">
      <div class="pane-left">${leftPane}</div>
      <div class="pane-right" id="rightPane">
        <div class="right-intro">
          <span class="conf-badge ${confClass}">Extraction confidence: ${r.text_confidence}</span>
          <div class="intro-text">Click any extracted value to flag it as incorrect. Click any empty field to flag it as missing. Flagging anything automatically sets the verdict to "Slightly off."</div>
        </div>
        <div class="section">
          <div class="sec-title">Metadata</div>
          <div class="meta-grid">
            ${Q('Job title','job_title',r.job_title)}
            ${Q('Employer','employer',r.employer)}
            ${Q('State','state',r.state)}
            <div class="mk">Salary (annualized)</div><div class="mv">${salHtml}</div>
            <div class="mk">Pay basis</div><div class="mv">${salBasis}</div>
            ${Q('Job classification','job_classification',r.job_classification)}
            <div class="mk">Elected position</div><div class="mv">${boolChip(r.row_id,'position_elected',r.position_elected)}</div>

            <div class="mk">Remote / hybrid</div><div class="mv">${boolChip(r.row_id,'remote_hybrid',r.remote_hybrid)}</div>
            ${Q('Registered voters','registered_voters',r.registered_voters)}
            ${Q('Best text source','text_used',btsDisplay)}
          </div>
        </div>
        <div class="section">
          <div class="sec-title">Skills</div>
          ${renderSkillsMatrix(r)}
        </div>
        <div class="section">
          <div class="sec-title">Election Security</div>
          ${secChip}
        </div>
        <div class="section">
          <div class="sec-title">Qualifications</div>
          <div class="meta-grid">
            ${Q('Degree required','degree_required',r.degree_required)}
            ${Q('Degree field','degree_field',r.degree_field)}
            ${Q('Minimum years of experience','min_years_experience',r.min_years_experience)}

            ${Q('Certifications required','certifications_required',r.certifications_required)}
            ${Q('Certifications preferred','certifications_preferred',r.certifications_preferred)}
            ${Q('Certifications substitutable','certifications_substitutable',r.certifications_substitutable)}
          </div>
        </div>
      </div>
    </div>

    <div class="verdict-row">
      <div>
        <div class="verdict-btns">
          <span class="v-lbl">Verdict:</span>
          <button class="v-btn correct  ${s.verdict==='correct'    ?'active':''}" onclick="setVerdict(${r.row_id},'correct')">✓ Correct</button>
          <button class="v-btn slightly ${s.verdict==='slightly_off'?'active':''}" onclick="setVerdict(${r.row_id},'slightly_off')">~ Slightly off</button>
          <button class="v-btn wayoff  ${s.verdict==='way_off'    ?'active':''}" onclick="setVerdict(${r.row_id},'way_off')">✗ Way off</button>
        </div>
        ${flagNote}
      </div>
      <div class="verdict-right">
        <textarea class="notes-ta" placeholder="Notes (optional)…" oninput="setNotes(${r.row_id},this.value)">${esc(s.notes)}</textarea>
      </div>
    </div>
  `;
  document.getElementById('jumpSel').value=pos;
}

function updateStats() {
  const c={correct:0,slightly_off:0,way_off:0,todo:0};
  DATA.forEach(r=>{ const v=state[r.row_id].verdict; if(!v)c.todo++; else c[v]=(c[v]||0)+1; });
  const done=DATA.length-c.todo;
  document.getElementById('n-correct').textContent=c.correct;
  document.getElementById('n-slightly').textContent=c.slightly_off||0;
  document.getElementById('n-wayoff').textContent=c.way_off||0;
  document.getElementById('pBar').style.width=(done/DATA.length*100)+'%';
  document.getElementById('pLbl').textContent=done+' / '+DATA.length+' reviewed';
}

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYlNoviOzUlV4a9lMOVPh0G3w3o-qAHSmRXVqVTVBJP9Dsn1mAn-bF-76hqn6fgTgp/exec';

function getAnonymousId() {
  let id = localStorage.getItem('reviewer_id');
  if (!id) {
    const ua = navigator.userAgent;
    const os = ua.match(/Mac|Win|Linux|iPhone|iPad|Android/)?.[0] || 'unknown';
    const browser = ua.match(/Chrome|Firefox|Safari|Edg/)?.[0] || 'browser';
    const rand = Math.random().toString(36).slice(2, 6);
    id = `${browser.toLowerCase()}-${os.toLowerCase()}-${rand}`;
    localStorage.setItem('reviewer_id', id);
  }
  return id;
}

function getSheetName() {
  const name = document.getElementById('reviewerName').value.trim();
  return name || getAnonymousId();
}

function saveReviewerName(val) {
  localStorage.setItem('reviewer_name', val.trim());
}

// Pre-load saved name on init
document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('reviewer_name');
  if (saved) document.getElementById('reviewerName').value = saved;
});

function buildCSV() {
  const cols=['review_id','row_id','year','era','job_title','employer','state',
    'job_classification','text_used','text_confidence',
    'salary_low_end','salary_high_end','pay_basis',
    'skill_categories_required','skill_categories_preferred','skill_categories_mentioned',
    'election_security_explicit','degree_required','degree_field','min_years_experience',
    'reviewer_verdict','reviewer_notes','flagged_fields'];
  const rows=[cols];
  DATA.forEach(r=>{
    const s=state[r.row_id];
    rows.push(cols.map(c=>{
      if(c==='reviewer_verdict') return s.verdict;
      if(c==='reviewer_notes')   return s.notes;
      if(c==='flagged_fields')   return [...s.flags].join('|');
      return r[c]||'';
    }));
  });
  return rows.map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
}

async function saveToSheet() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  btn.className = 'export-btn';
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ sheetName: getSheetName(), csv: buildCSV() })
    });
    btn.textContent = '✓ Saved';
    btn.classList.add('saved');
  } catch {
    btn.textContent = '✗ Failed';
    btn.classList.add('failed');
  }
  // Reset after 3s
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = 'Save results';
    btn.className = 'export-btn';
  }, 3000);
}

document.addEventListener('keydown', e=>{
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  const r=row();
  if(e.key==='ArrowRight') navigate(1);
  if(e.key==='ArrowLeft')  navigate(-1);
  if(e.key==='1') setVerdict(r.row_id,'correct');
  if(e.key==='2') setVerdict(r.row_id,'slightly_off');
  if(e.key==='3') setVerdict(r.row_id,'way_off');
});

populateJump(); render(false); updateStats();
</script>
