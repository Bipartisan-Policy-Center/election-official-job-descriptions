* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

.prog-bar { background: #4ade80; height: 100%; border-radius: 999px; transition: width .3s; }
.prog-lbl { font-size: 11px; opacity: .85; white-space: nowrap; }

.nav { flex-shrink: 0; background: white; border-bottom: 1px solid #dde3f0; padding: 7px 24px; display: flex; align-items: center; gap: 8px; z-index: 90; }

.nav-stats { display: flex; gap: 10px; margin-left: 6px; }
.nstat { font-size: 11px; padding: 2px 7px; border-radius: 999px; font-weight: 600; }
.nstat-c { background: #dcfce7; color: #15803d; }
.nstat-s { background: #fef9c3; color: #b45309; }
.nstat-w { background: #fee2e2; color: #b91c1c; }
.nav-right { margin-left: auto; display: flex; gap: 7px; align-items: center; }
.nav-right label { font-size: 11px; color: #777; }
.nav-right select { font-size: 11px; border: 1px solid #d0d7e8; border-radius: 5px; padding: 3px 6px; background: white; color: #333; max-width: 230px; }
.export-btn { padding: 4px 12px; border-radius: 6px; border: none; background: #1a2744; color: white; cursor: pointer; font-size: 11px; font-weight: 600; transition: background .2s; }
.export-btn:hover:not(:disabled) { background: #243461; }
.export-btn:disabled { opacity: .7; cursor: default; }

.reviewer-input::placeholder { color: rgba(255,255,255,.45); }
.reviewer-input:focus { border-color: rgba(255,255,255,.55); background: rgba(255,255,255,.15); }
.header-save { display: flex; gap: 7px; align-items: center; }
.kbd { font-size: 10px; color: #bbb; white-space: nowrap; }

.page-body { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 10px 18px; overflow: hidden; }
.card { flex: 1; min-height: 0; background: white; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.09); display: flex; flex-direction: column; overflow: hidden; }

.card-head { flex-shrink: 0; padding: 12px 18px; border-bottom: 1px solid #eaeff8; display: flex; align-items: flex-start; gap: 12px; }
.cid { background: #1a2744; color: white; border-radius: 5px; padding: 2px 8px; font-size: 11px; font-weight: 700; white-space: nowrap; margin-top: 2px; }

.card-meta .sub { font-size: 11px; color: #777; margin-top: 2px; }
.edge-note { font-size: 10px; color: #9d174d; background: #fce7f3; border-radius: 4px; padding: 1px 6px; display: inline-block; margin-top: 4px; }

.panes { flex: 1; min-height: 0; display: grid; grid-template-columns: 45% 55%; border-top: 1px solid #eaeff8; overflow: hidden; }
.pane-left { display: flex; flex-direction: column; padding: 14px 18px; overflow: hidden; border-right: 1px solid #eaeff8; }
.pane-lbl { flex-shrink: 0; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .9px; color: #94a3b8; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.best-tag { background: #dbeafe; color: #1e40af; border-radius: 4px; padding: 1px 5px; font-size: 9px; font-weight: 700; text-transform: uppercase; }

.text-box { font-size: 12px; line-height: 1.6; color: #2d3748; white-space: pre-wrap; word-break: break-word; overflow-y: auto; border: 1px solid #e2e8f4; border-radius: 7px; padding: 10px 13px; background: #fafbfd; }
.text-box.grow       { flex: 1; min-height: 0; }
.text-box.split-stub { flex: 0 0 35%; min-height: 0; }
.text-box.split-full { flex: 1; min-height: 0; background: #f7fbff; border-color: #bfdbfe; }
.text-divider { flex-shrink: 0; display: flex; align-items: center; gap: 8px; margin: 8px 0 5px; font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .8px; }
.text-divider::before, .text-divider::after { content:''; flex:1; height:1px; background:#e2e8f4; }
.no-full { flex-shrink: 0; font-size: 11px; color: #bbb; font-style: italic; margin-top: 6px; }

.pane-right { overflow-y: auto; padding: 14px 18px; }
.right-intro { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 2px solid #eaeff8; }
.conf-badge { padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; display: inline-block; margin-bottom: 5px; }
.conf-badge.medium { background: #fffbeb; color: #b45309; border-color: #fde68a; }
.conf-badge.low    { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
.intro-text { font-size: 11px; color: #94a3b8; line-height: 1.5; }

.section { margin-bottom: 16px; }
.sec-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .9px; color: #94a3b8; margin-bottom: 7px; padding-bottom: 4px; border-bottom: 1px solid #eaeff8; }
.meta-grid { display: grid; grid-template-columns: auto 1fr; gap: 5px 12px; align-items: start; }
.mk { font-size: 11px; color: #94a3b8; font-weight: 500; white-space: nowrap; padding-top: 3px; }

.chip { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all .12s; user-select: none; border: 1.5px solid transparent; }
.chip.has-value { background: #f1f5f9; color: #334155; border-color: #e2e8f4; }
.chip.has-value:hover { border-color: #94a3b8; }
.chip.has-value.flagged { background: #fef2f2; color: #b91c1c; border-color: #fca5a5; }
.chip.no-value { background: white; color: #cbd5e1; border: 1.5px dashed #e2e8f4; font-style: italic; }
.chip.no-value:hover { border-color: #f59e0b; color: #92400e; }
.chip.no-value.flagged { background: #fff7ed; color: #c2410c; border: 1.5px solid #fdba74; font-style: normal; }

.skill-table { width: 100%; border-collapse: collapse; }
.skill-table th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #94a3b8; padding: 3px 6px; text-align: center; border-bottom: 1px solid #eaeff8; }

.sc-fn  { background: #fff7ed; color: #c2410c; border-color: #fdba74; }

<div class="header">
  <div>

  </div>

      <button class="export-btn" id="saveBtn" onclick="saveToSheet()">Save results</button>
    </div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← Previous</button>
  <span class="nav-pos" id="navPos">1 / 30</span>
  <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next →</button>
  <div class="nav-stats">
    <span class="nstat nstat-c">✓ <span id="n-correct">0</span></span>
    <span class="nstat nstat-s">~ <span id="n-slightly">0</span></span>
    <span class="nstat nstat-w">✗ <span id="n-wayoff">0</span></span>
  </div>
  <div class="nav-right">
    <label>Jump to:</label>
    <select id="jumpSel" onchange="jumpTo(this.value)"></select>
    <label>Filter:</label>
    <select id="filtSel" onchange="applyFilter()">
      <option value="all">All rows</option>
      <option value="todo">Not yet reviewed</option>
      <option value="correct">Correct</option>
      <option value="slightly_off">Slightly off</option>
      <option value="way_off">Way off</option>
    </select>
    <span class="kbd">← → navigate &nbsp;|&nbsp; 1 correct &nbsp; 2 slightly off &nbsp; 3 way off</span>
  </div>
</div>

<div class="page-body">
  <div class="card" id="mainCard"></div>
</div>

 the Elections Code, the Registrar of Voters plans, organizes, evaluates, and directs the operations and activities of the Department of Voter Registration. This position functions as the appointing authority of the department and is responsible for all divisions within the department including administration, campaign services, precinct operations and outreach, registration, and voting systems which include technology and vote-by-mail. The Registrar of Voters reports directly to the Deputy County Executive–Administrative Services and is exempt from Civil Service. The incumbent is responsible for advising and assisting the officials of the County agencies, departments, boards and commissions with respect to matters assigned to the department. Through subordinate managers, the incumbent is responsible for developing and managing the goals, objectives, and policies of the department. Salary: $134,425.44 – $148,206.25. Deadline: Jan. 31, 2018. Application: For the complete job listing and to apply, click here.", "best_text": "=== JOB DETAILS ===\n\nSalary: $154,261.44 - $170,067.60 Annually\nLocation: Sacramento, CA\nJob Type: Permanent Full-Time Exempt\nJob Number: 28356-17-O\nDepartment: Voter Registration & Elections\nOpening Date: 12/13/2017\nClosing Date: 2/16/2018 5:00 PM Pacific\n\n=== JOB DESCRIPTION ===\n\nOnline applications are not being accepted for this position. To see the complete brochure, please click here. (Download PDF reader)\n \nIn addition to the salary listed above, compensation includes a 3.35% management differential and excellent benefits.\n \nThe Position\n\nWorking under the duties required by the Elections Code, the Registrar of Voters plans, organizes, evaluates, and directs the operations and activities of the Department of Voter Registration. This position functions as the appointing authority of the department and is responsible for all divisions within the department including administration, campaign services, precinct operations and outreach, registration, and voting systems which include technology and vote-by-mail.\n\nThe Registrar of Voters reports directly to the Deputy County Executive--Administrative Services and is exempt from Civil Service. The incumbent is responsible for advising and assisting the officials of the County agencies, departments, boards and commissions with respect to matters assigned to the department. Through subordinate managers, the incumbent is responsible for developing and managing the goals, objectives, and policies of the department.\n\nKnowledge of\n\nPrinciples and practices of personnel administration in the public sector necessary to select, direct, supervise, train, and evaluate a diverse, multidisciplinary staff through subordinate managers; effective training models and staff development practices\nSocial, political and economic issues influencing program administration\nCalifornia, federal and local laws, rules, regulations, ordinances, and procedures affecting the administration of elections and the registration of voters\nVoting systems and processes used in voter registration and election activities\nDemonstrated skill and ability to\nManage and lead a complex organization, to include strategic planning and performance management, public sector budget development and administration, and personnel management\nDevelop and maintain cooperative relationships with a wide variety of stakeholders, such as public and private agencies, other governmental organizations, the general public, and the media\nBe politically sensitive to challenges and opportunities related to election processes, voter registration, candidates, and ballot issues\nInfluence and persuade others to accept a particular viewpoint or follow a particular course of action\nCollaborate and/or negotiate with interested groups and agencies to gain cooperation in support of the department's goals\nRecognize and effectively respond to the ever-changing priorities, needs, and conditions related to the assignment\nPrepare and deliver clear and concise reports, correspondence and presentations\nExercise sound independent judgment within broad policy guidelines\n\nThe Ideal Candidate\n\nIdeal candidates will have the following education:\n\nA Bachelor's degree, or higher, from an accredited college or university in business administration, political science, or a closely related field.\n \nIdeal candidates will have the following experience:\n\nFive or more years of experience administering a voter registration and elections program, senior level managing, directing, developing, implementing, coordinating, and evaluating a team of professionals performing the full scope of work required within an elections environment\nExtensive, in-depth management experience in the provision of voter registration services\nExperience formulating and implementing comprehensive operational programs, budgets, and administrative operations\nExperience working within a large governmental jurisdiction\nIdeal candidates will have the following certification(s):\n\nProfessional certification from Certified Public Official, Election Administration Option (CPO) and/or the national Certified Elections/Registration Administrator (CERA) and the Statewide certification of California Professional Election Administrator Certification (CalPEAC)\n\nTo apply for this career opportunity, please submit your resume, a cover letter detailing your qualifying experience, and three (3) professional references to Candice Mabra via email at MabraC@saccounty.net by 5:00 pm. on January 31, 2018.", "skill_categories_required": "ops|vr|legal|personnel|budget|comms|intergovt", "skill_categories_preferred": "", "skill_categories_mentioned": "ops|vr|legal|it_cyber|personnel|budget|comms|intergovt", "election_security_explicit": false, "degree_required": "bachelor", "degree_field": "business administration, political science, or closely related field", "min_years_experience": 5.0, "experience_can_substitute": f ons and activities of the Elections Department. Work is performed under the general administrative direction of the Elections Director. The employee is expected to exercise initiative, independent judgment and discretion. Salary: $49,647-$56,473. Application: For the complete job listing and to apply, click here.", "skill_categories_required": "ops|pm|personnel", "skill_categories_preferred": "", "skill_categories_mentioned": "ops|pm|personnel", "election_security_explicit": false, "degree_required": "", "degree_field": "", "min_years_experience": "", "experience_can_substitute": "", "certifications_required": "", "certifications_preferred": "", "certifications_substitutable": "", "link": "", "reviewer_verdict": "", "reviewer_notes": "", "flagged_fields": ""}, {"review_id": 10, "row_id": 1229, "sample_type": "stratified", "edge_case_type": "", "year": 2018, "era": "2015-2018", "date": "19-Jul", "job_title": "Departmental Analyst 12 - Senior Elections Online Training Specialist", "employer": "State of Michigan, Department of State", "state": "Michigan", "job_classification": "election_official", "classification_confidence": "high", "position_elected": false, "full_time": true, "remote_hybrid": "", "registered_voters": 3400.0, "text_used": "full_text", "text_confidence": "high", "skill_count": 7, "salary_low_end": 49628.8, "salary_high_end": 72571.2, "pay_basis": "yearly", "description": "Senior Elections Online Training Specialist, Michigan secretary of state’s office — this position oversees and leads Bureau of Elections (BOE) activities related to the planning, development, implementation, maintenance, communication and tracking of online training programs and other online references and resources.  This position is responsible for overseeing and planning all aspects of the online Elections eLearning Center, which serves approximately 3,400 election officials statewide.  Duties include development of the overall online training curriculum and required components of Michigan’s mandated Continuing Education program for election officials; developing and maintaining the overall online training learning management system (LMS) currently contracted with Cornerstone on Demand; developing online SCORM course material covering complex topics related to election administration, utilizing specialized software like Lectora and Camtasia; managing the system components related to enrolling, assigning, and tracking election officials’ completion of online coursework to ensure required training elements are completed timely; developing complex online data collection through an application like Zoho; managing  contracts with outside service providers; and coordinating, managing and implementing continual updates and improvements to all BOE web resources. The position also provides technical assistance to Michigan election officials and BOE staff, develops training manuals and other reference material; leads and participates on special projects; and acts as a state- and national-level liaison for BOE related to our online training programs. Salary: $48,651-$71,156. Deadline: July 24. Application: For the complete job listing and to apply, click here.", "best_text": "=== JOB DETAILS ===\n\nTitle: Departmental Analyst 12- Senior Elections Online Training Specialist\nSalary: $49,628.80 - $72,571.20 YEAR\nLocation: Lansing, MI, MI, 48909\nEmployer: State of Michigan\nEmployment Type: OTHER\nDate Posted: 2018-07-12\nJob Type: Permanent Full Time\nJob Number: 2301-18-EL308\nDepartment: Department of State\nOpening Date: 07/13/2018\nClosing Date: 7/24/2018 11:59 PM Eastern\nBargaining Unit: NON-EXCLUSIVE REPRESENTED EMPLOYEE (NERE)\n\n=== JOB DESCRIPTION ===\n\n\nPOSITION DUTIES – This position oversees and leads Bureau of Elections (BOE) activities related to the planning, development, implementation, maintenance, communication and tracking of online training programs and other online references and resources.  This position is responsible for overseeing and planning all aspects of the online Elections eLearning Center, which serves approximately 3,400 election officials statewide.  Duties include development of the overall online training curriculum and required components of Michigan's mandated Continuing Education program for election officials; developing and maintaining the overall online training learning management system (LMS) currently contracted with Cornerstone on Demand; developing online SCORM course material covering complex topics related to election administration, utilizing specialized software like Lectora and Camtasia; managing the system components related to enrolling, assigning, and tracking election officials' completion of online coursework to ensure required training elements are completed timely; developing complex online data collection through an application like Zoho; managing  contracts with outside service providers; and coordinating, managing and implementing continual updates and improvements to all BOE web resources. The position also provides technical assistance to Michigan election officials and BOE staff, develops training manuals and other reference material; leads and participates on special projects; and acts as a state- and national-level liaison for BOE related to our online training programs.  \n\nAPPOINTMENT TYPE/BENEFITS - This position is Full-Time. Therefore, you would be eligible to participate in the benefits offered by the state.\n\nDepartmental Analyst 12 - Position Description\n\nEducation\nPossession of a bachelor's degree in any major.\n\nExperience\nThree years of professional experience, including one year of experience equivalent to the experienced (P11) level in state service.\n\nAccommodations\nIf you require a reasonable accommodation to participate in the application or selection processes, please contact the ADA coordinator (Download PDF reader) for the agency that posted this position vacancy.\n\n State employment benefits include everything from health insurance to retirement income and are worth about 40% of your salary This page gives a brief explanation of some of the benefits that are provided by the State of Michigan according to union contracts or Civil Service Rules. See details on these and other employment information.Leave TimeFull time employees receive between 15 and 35 vacation leave days per year. Employees also receive 13 sick days per year, and employees receive 8 hours of leave to participate in certain school functions or community activities. Employees may also qualify for up to 12 weeks of unpaid leave for certain family or medical situations.HolidaysState employees receive 12 scheduled holidays each year, which include New Years Eve Day and New Years Day, Christmas Eve Day and Christmas Day, Memorial Day, and Veterans Day just to name a few.Alternative Work SchedulesFlexible work schedules and telecommuting options are available in many jobs.Insurance and Other BenefitsInsurances include health, vision, dental and life. Employees also have the option to purchase additional life, accidental death, long term disability, long term care insurance, and legal services. Flexible spending accounts for medical expenses and child care are also available.Deferred CompensationEmployees may invest income in a tax-deferred retirement investment program. The state offers two optional deferred compensation plans, the 457 and 401(k). Employees decide the amount you want deducted from your paycheck.RetirementEmployees receive a minimum 4% state contribution toward their retirement fund. If an employee elects to contribute more, the state will match that percentage (up to 3%). ORS administers two different retirement plans for State of Michigan employees: a Defined Benefit (DB) plan and a Defined Contribution (DC) plan. Use the following link for detailed information: Two plans for State Employees\n\n\n                            \n    \n        \n\n01\n\n    \n\n    \n        DEPTALT - Do you possess one of the following?  \n\nA bachelor's degree or higher in any major.  If so, please attach a copy of your official college transcripts;\n\nOR\n\nat least one year of professional level experience in the state of Michigan classified service.\n        \n        \n                Yes\n                No\n        \n    \n\n\n    \n        \n\n02\n\n    \n\n    \n        DEPTALTA- Do you possess at least three years of professional experience?\n        \n        \n                Yes\n                No\n        \n    \n\n\n    \n        \n\n03\n\n    \n\n    \n        Are you related to anyone working at the Department of State (Secretary of State)?\n        \n        \n                Yes\n                No\n        \n    \n\n\n    \n        \n\n04\n\n    \n\n    \n        If you answered \"yes\" to question #3, please list the name of each relative. If you answered \"no\" to question #3, please enter \"none.\"\n        \n        \n        \n    \n\n\n    \n        \n\n05\n\n    \n\n    \n        Please select your experience related to the planning, development, and maintenance of a learning management system and developing online training courses and videos.\n        \n        \n                None\n                Less than 1 year\n                1 year - 2 years\n                3 years - 4 years\n                More than 4 years\n        \n    \n\n\n    \n        \n\n06\n\n    \n\n    \n        Please describe your experience related to the planning, development, and maintenance of a learning management system and developing online training courses and videos. If you do not possess this experience, please enter \"none\".\n        \n        \n        \n    \n\n\n    \n        \n\n07\n\n    \n\n    \n        Please select your experience with the planning, development, and maintenance of web pages.\n        \n        \n                None\n                Less than 1 year\n                1 year - 2 years\n                3 years - 4 years\n                More than 4 years\n        \n    \n\n\n    \n        \n\n08\n\n    \n\n    \n        Please describe your experience with the planning, development, and maintenance of web pages. If you do not possess this experience, please enter \"none\".\n        \n        \n        \n    \n\n\n    \n        \n\n09\n\n    \n\n    \n        Please describe other technical software program experience relevant to the position description. If you do not possess this experience, please enter \"none\".\n        \n        \n        \n    \n\n\n                                \n                                     Required Question", "skill_categories_required": "pm|data|it_cyber", "skill_categories_preferred": "", "skill_categories_mentioned": "it_cyber|intergovt|pm|personnel|ops|comms|data", "election_security_explicit": false, "degree_required": "bachelor", "degree_field": "", "min_years_experience": 3.0, "experience_can_substitute": true, "certifications_required": "", "certifications_preferred": "", "certifications_substitutable": "", "link": "https://www.governmentjobs.com/careers/michigan/jobs/2120578/departmental-analyst-12-senior-elections-online-training-specialist?keywords=analyst&page=3&pagetype=jobOpportunitiesJobs", "reviewer_verdict": "", "reviewer_notes": "", "flagged_fields": ""}, {"review_id": 11, "row_id": 1267, "sample_type": "stratified", "edge_case_type": "", "year": 2018, "era": "2015-2018", "date": "10-May", "job_title": "Clerk-Recorder Services Technician", "employer": "Contra Costa County Clerk-Recorder-Elections Department", "state": "California", "job_classification": "not_election_official", "classification_confidence": "high", "position_elected": false, "full_time": true, "remote_hybrid": "on_site", "registered_voters": "", "text_used": "full_text", "text_confidence": "high", "skill_count": 4, "salary_low_end": 47152.8, "salary_high_end": 57314.52, "pay_basis": "yearly", "description": "Clerk-Recorder Services Technician, Contra Costa County, California— the Clerk-Recorder Services Technician is a technical position assigned to one of the specialized units of the Clerk-Recorder Division: Recording, Clerk Services, Imaging/Indexing and Archive/Warehouse Services.  This position performs technical and complex data entry and clerical that may include: fictitious business name, general clerk filings, notary, passport, marriage license application processing and marriage ceremonies, real property and other general document recordings, document indexing and/or general index verification, customer service desk and phone support, and perform database management in one or more database systems; and perform related work as required. Salary: $44,018-$53,505. Deadline: May 11. Application: For the complete job listing and to apply, click here.", "best_text": "=== JOB DETAILS ===\n\nSalary: $47,152.80 - $57,314.52 Annually\nLocation: Martinez, CA\nJob Type: Permanent Full-Time\nJob Number: EAVA-2018A\nDepartment: Clerk - Recorder\nOpening Date: 04/30/2018\nClosing Date: 5/11/2018 11:59 PM Pacific\nFLSA: Non-Exempt\nBargaining Unit: 3R\n\n=== JOB DESCRIPTION ===\n\nBargaining Unit: Local 2700 - General Clerical Unit \n \nThe Contra Costa County Clerk-Recorder is currently recruiting for the position of Clerk-Recorder Services Technician, located in the Recorder's Division of the Clerk-Recorder-Elections Department, in downtown Martinez,\n \nThe Clerk-Recorder Services Technician is a technical position assigned to one of the specialized units of the Clerk-Recorder Division: Recording, Clerk Services, Imaging/Indexing and Archive/Warehouse Services.  This position performs technical and complex data entry and clerical that may include: fictitious business name, general clerk filings, notary, passport, marriage license application processing and marriage ceremonies, real property and other general document recordings, document indexing and/or general index verification, customer service desk and phone support, and perform database management in one or more database systems; and perform related work as required.\n \nThe ideal candidate will possess the following:\n \n\nKnowledge and understanding of County and Recorder functions as well as how the units interrelate\nKnowledge of the principles and practices of work organization and the ability to apply them in planning, coordinating and completing work activities to meet specific deadlines\nThe ability to operate personal computers and peripheral equipment, including knowledge of spreadsheet, word processing, and database management programs\nKnowledge of codes and laws relating to County Clerk and Recording functions, and the ability to independently apply them \nAbility to work in a fast paced environment with shifting priorities and time lines\nExcellent interpersonal skills, as the incumbent will interface with staff at all levels, as well as county officials and members of the public\nEffective oral and written communication skills\n \nRead the complete job description at www.cccounty.us. The eligible list established from this recruitment may remain in effect for six months.\n \nTENTATIVE EXAM DATES\nTentative Exam:  May 23, 2018\n\nDepending on area of assignment, duties may include, but are not limited to the following:\n\nAll Units\n\nUses computer-based programs and equipment to perform a variety of functions, including designing reports, forms, envelopes, and instruction sheets, processing customer requests, on-line database research, data entry, cashiering, document indexing, correspondence, form processing, quality and accuracy verification\nPerforms complex and technical day-to-day functions of the unit\nAnswers questions from the public regarding complex issues, including laws and regulations governing clerk and recorder processes. This may be at the counter, over the phone or electronically\nAssists with studies on division matters and prepares professional reports\nProvides positive customer service, in person, on the phone or electronically\nIdentifies requirements and schedules adequate time to prepare necessary documents and/or supplies to meet deadlines according to appropriate codes and department's procedures\nImplements and follows procedures to increase efficiency and accuracy of division processes\nAccurately cashiers transactions, collects fees, makes correct change and reconciles cash drawer to accounting reports\nSorts incoming mail, processes according to division policies and procedures\nMonitors and strictly controls access to confidential information\nAssures security policies and procedures are strictly followed at all times for the facility, as well as documents and/or bank note security paper\nAssists with reviews of procedures to assure completeness and correctness\nAssists with maintenance of the division desk manuals\nMaintains files, materials and records related to the division\nPerforms basic routine office equipment maintenance and troubleshooting; coordinates calls for service and/or repairs\nMay attend meetings, trainings and/or seminars related to division unit as directed\nAssists with design and presentation of training programs to division employees, volunteer workers, and members of the public\nAssists other functional units in day-to-day duties, as needed or directed\n\nIn addition to the above:\n\nRecording Services\nExamines complex real property or other documents presented for recording for completeness, accuracy and proper execution\nDetermines sufficiency for recording based on applicable California codes and division procedures\nRejects documents that do not meet recording requirements\nCorresponds with document presenters, specifying reason(s) for recording rejection\nValidates general index for accuracy and completeness\nEnters and maintains data in proprietary database system\nAssist with examination of maps presented for recording to determine sufficiency of completeness, accuracy and proper execution\nProvides direct support to Clerk-Recorder Services Specialists performing public (counter) or most complex recordings\n\nClerk Services\nExamines documents presented for filing for completeness, accuracy and proper execution\nDetermines sufficiency for filing based on applicable California codes and division procedures\nEnters and maintains data in proprietary database system\nProvides guidance and direction to the public or other agencies at the customer service information counter\nSchedules weddings according to division policies and procedures\nProvides copies of vital or real property records from public record databases according to applicable California codes and division policies and procedures\nIssues marriage licenses according to applicable California code requirements and division policies and procedures\nIssues oaths and witnesses signatures as Deputy Clerk according to applicable California codes and division policies and procedures\nPerforms analysis of supporting information to confirm sufficiency for Professional Registration applicants\nAssists with the proper security process for ordering, receipt and storage of registered supplies (vital record bank note paper).\nFollows destruction schedule, assists with timely destruction according to schedule\n\nImaging/Indexing and Archive/Warehouse Support\nAssists with data entry, index verification and database maintenance of Clerk-Recorder records\nAssists with redaction of documents to meet California State Social Security Truncation Program requirements\nPrepares documents for imaging, enters data and images into database system\nAssures image and information quality control is according to and meets California codes and division policies and procedures\nAssists with maintenance of Clerk-Recorder archive and warehouse inventory\nFollows division procedures to provide access to archive facility\nAssures sufficient supply inventory is available for division operations\nFollows destruction schedule, assists with timely destruction according to schedule\nProduces archive copies of Real Property records and index, or other documents from digital database\nPrepares customer requests for electronic records according to California codes and division policies and procedures\n\nLicense Required: Possession of a valid California motor vehicle operator's license.  Out of state valid motor vehicle operator's license will be accepted during the application process.\n \nEducation:  Possession of a high school diploma, G.E.D. equivalency or high school proficiency certificate.\n \nExperience: Two (2) years of full-time, or its equivalent, clerical or technical experience using spreadsheets, word processing and database management programs.  At least (6) six months of the required experience must have included performing duties related to technical clerk and recorder responsibilities for a County Clerk-Recorder's Office.\n\nNote: The Clerk-Recorder Technician is a specialized classification requiring knowledge of the California Codes, regulations and laws related to County Clerk and Recorder Functions; general clerical experience will not be substituted for the required (6) months experience as noted above.\n \n\nApplication Filing:  All applicants must apply on-line at www.cccounty.us/hr and submit the information as indicated on the job announcement by the final filing date. A completed Supplemental Questionnaire is required at the time of applying.\n\nOral Interview: Conducted by a Qualifications Appraisal Board who will evaluate candidates in job-related areas. Candidates must receive a score of at least 70, which may be an adjusted score, in order to be ranked on the employment list. (Weighted 100%)\n \nThe Human Resources Department may change the examination steps noted above in accordance with the Personnel Management Regulations and accepted selection practices.\n \n\nTHE COUNTY OF CONTRA COSTA IS AN EQUAL OPPORTUNITY EMPLOYER AND\n\nVALUES DIVERSITY AT ALL LEVELS OF THE ORGANIZATION\n\nIt is the policy of Contra Costa County to consider all applicants for employment without regard to race, color, religion, sex, national origin, ethnicity, age, disability, sexual orientation, gender, gender identity, gender expression, marital status, ancestry, medical condition, genetic information, military or veteran status, or other protected category under the law.\n\nTo find more information on Benefits offered by Contra Costa County, please go to https://www.contracosta.ca.gov/1343/Employee-Benefits\n\n\n                            \n    \n        \n\n01\n\n    \n\n    \n        EXPERIENCE:  Please select all areas in which you have prior experience.\n        \n        \n                Recorded legal documents [in a public office], such as birth, death or marriage licenses\n                Recorded, filed and processed fictitious business applications, notary bonds, environmental documents and other documents required by state/federal laws to be filled with a clerk-recorder agency\n                Reviewed, accepted applications in a clerk and recording agency\n                Recorded and issued marriage licenses\n                Documented or examined Real Property documents\n                Checked Grantor/Grantee index of all documents recorded\n                Recorded file and archive any of the above documents\n                Imaging and indexing of legal documents\n                I do not have any of the above experience\n        \n    \n\n\n    \n        \n\n02\n\n    \n\n    \n        Describe your role in the experience indicated above, in detail, including the following information:\n\n•\tEmployer's Name, Official Work Title\n•\tEmployment dates and number of hours worked per week\n•\tPercentage (%) of time spent supporting this function\n•\tScope of responsibilities\n(If you do not have any applicable experience, please indicate \"N/A\".)\n        \n        \n        \n    \n\n\n    \n        \n\n03\n\n    \n\n    \n        I certify that I meet the announced requirements for this examination and understand that I will be eliminated at any stage in such examination if it develops that, in fact I do not meet them. I further certify that all statements made in this supplemental questionnaire and the application are true and I agree and understand that misstatements or omissions of material facts will cause forfeiture of my rights to employment with Contra Costa County.\n        \n        \n                Yes\n        \n    \n\n\n                                \n                                     Required Question", "skill_categories_required": "ops|data|legal", "skill_categories_preferred": "", "skill_categories_mentioned": "ops|data|legal|comms", "election_security_explicit": false, "degree_required": "high_school", "degree_field": "", "min_years_experience": 2.0, "experience_can_substitute": "", "certifications_required": "", "certifications_preferred": "", "certifications_substitutable": "", "link": "https://www.governmentjobs.com/careers/contracosta/jobs/2055861-0/clerk-recorder-services-technician", "reviewer_verdict": "", "reviewer_notes": "", "flagged_fields": ""}, {"review_id": 12, "row_id": 1180, "sample_type": "edge_case", "edge_case_type": "high_skill_count", "year": 2019, "era": "2019-2022", "date": "11-Jul", "job_title": "Elections Specialist II", "employer": "Douglas County Government (CO)", "state": "Colorado", "job_classification": "election_official", "classification_confidence": "high", "position_elected": false, "full_time": true, "remote_hybrid": "on_site", "registered_voters": "", "text_used": "full_text", "text_confidence": "high", "skill_count": 10, "salary_low_end": 38568.0, "salary_high_end": 48204.0, "pay_basis": "monthly", "description": "Election Specialist II, Douglas County, Colorado— The Election Specialist II is responsible for routine support services related to temporary employees, training, Voter Service and Polling Centers, mail ballot processing, voter registration, and customer service. This position contributes to the department’s achievement of delivering efficient, transparent, fair and accurate elections as well as performs other projects as assigned. This position requires technical work in a lead role capable of performing a variety of complex tasks, with solving problem abilities, managing multiple competing tasks and prioritizing to maintain a continuous flow of operations and temporary support. This is a visible and crucial position requiring previous elections experience, and exceptional computer, customer service, and communication skills. Please note this position is posted as open until filled, review of applications will begin immediately and continue until a suitable candidate is selected. Salary: $3,214 – $4,017 Monthly. Application: For the complete job listing and to apply, click here.", "best_text": "=== JOB DETAILS ===\n\nTitle: Elections Specialist II\nSalary: $3,214.00 - $4,017.00 MONTH\nLocation: Castle Rock, CO, CO, 80104\nEmployer: Douglas County Government (CO)\nEmployment Type: OTHER\nDate Posted: 2019-04-30\nJob Type: Full-Time Regular\nJob Number: 1132S 4/1/19\nDepartment: Clerk & Recorder\nOpening Date: 05/01/2019\nClosing Date: 5/16/2019 12:00 PM Mountain\nFLSA: Non-Exempt\n\nBENEFITS:\n  • 10 ½ paid holidays each year + a floating holiday\n  • 8 hours of paid vacation per month\n  • 8 hours of paid sick time per month\n  • Medical insurance employees can choose from three plan options:   Aetna WHN CO Front Range Select,  Aetna Open Access Select (HMO) or Aetna WHN CO Front Range Choice POSII HDHP/HSA.\n  • Life insurance 1.5 times employee salary at no cost to employee\n  • Short-term and long-term disability at no cost to employee\n  • Mandatory retirement – defined contribution of either 6% or 8% - matched at 8%\n  • Annual performance reviews with potential for an increase\n\nAdditionally, we offer dental, vision, accident/critical illness insurance, tuition reimbursement, and employee training.  Part-time employees receive a pro-rated benefits package.\n\n=== JOB DESCRIPTION ===\n\n\nThe Election Specialist II is responsible for routine support services related to temporary employees, training, Voter Service and Polling Centers, mail ballot processing, voter registration, and customer service. This position contributes to the department's achievement of delivering efficient, transparent, fair and accurate elections as well as performs other projects as assigned. This position requires technical work in a lead role capable of performing a variety of complex tasks, with solving problem abilities, managing multiple competing tasks and prioritizing to maintain a continuous flow of operations and temporary support. This is a visible and crucial position requiring previous elections experience, and exceptional computer, customer service, and communication skills. \n \nPlease note this position is posted as open until filled, review of applications will begin immediately and continue until a suitable candidate is selected.\n \n\n\n(The following examples are illustrative only and are not intended to be all-inclusive.)\n \n·       Supports all functions related to hiring, onboarding, training, and return employment of temporary employees.\n·       Creates, revises, and maintains training materials.\n·       Coordinates technology needs, creates and implements schedules, and conducts training for temporary employees and election judges.\n·       Administers state election laws and rules, and federal election laws to provide successful voting experience to staff and public.\n·       Maintains confidentiality of information consistent with applicable federal, state, and county rules and regulations.\n·       Provides daily customer service; answers phones; greets and serves in person customers.\n·       Coordinates Elections Office staff events and hospitality support for Election Day.\n·       Creates, revises, and maintains standard operating procedures to perform role specific functions.\n·       Performs quality assurance on functional area processes on a continual basis.\n·       Performs voter registration data entry and data entry proofing; manages National Change of Address.\n·       Generates reports for public, political parties, and management as requested including support for Colorado Open Records Act.\n·       Participates in cross-training efforts within Elections Division and in other divisions of the Clerk and Recorder's Office.\n·       Attends training, conferences, workshops, or online courses to obtain and/or maintain Certified Election Official status, to enhance and maintain knowledge of trends and developments in the field, and to gain knowledge and information to assist with professional development.\n·       Establishes and maintains effective working relationships with other employees, departments, agencies, and the public.\n·       Assists with special projects.\n·       Cross-trained to cover responsibilities of Elections Specialist I and in functions related to election judge coordination.\n·       Performs other duties as assigned in support of business operations and statutory compliance.\n \nVOTER REGISTRATION AND MAIL BALLOT PROCESSING:\n·       Prepares mail ballot sorting equipment, including, programming, testing, signature upload/download, troubleshooting, and working with vendor as needed.\n·       Oversees mail ballot processing and provisional teams.\n·       Maintains mail ballot processing logs, reports, and other related documentation.\n·       Oversees ballot processing room including, ballot receiving, ballot verification, ballot processing and ballot duplication.\n·       Manages pre-election UOCAVA (Uniformed and Overseas Citizens Absentee Voting Act) processes in preparation for delivery of correspondence and ballots.\n·       Oversees UOCAVA registrations, out-going and in-coming ballots, both electronic and paper formats and delegates assignments to maintain compliance.\n·       Oversees the export and generation of daily out-going ballots, processing, and preparation for mailing.\n·       Assist in User Acceptance Testing of the Statewide Voter Registration System (SCORE).\n·       Ensures adequate mail ballot kit stock is maintained in designated ballot preparation area and for use at Voter Service and Polling Centers (VSPCs).\n \nADDRESSING AND MAPPING\n·       Assists with street, parcel, and precinct research to correctly define all jurisdictions (political, municipal, special service) in the Voter Registration (SCORE) database.\n·       Assists with mapping functions necessary for creation and maintenance of address library.\n·       Assists with research to re-define district boundaries resulting from reapportionment, re-predicting, and zip code changes.\n·       Cross-trained to cover responsibilities of Mapping and Addressing Coordinator.\n \n\n\nEDUCATION and/or EXPERIENCE: \n·       HS Diploma or GED and 18 months of experience in the conduct of elections.\n·       Associates Degree in Business Management, Public Administration, or similar field preferred or equivalent combination of education and experience.\n·       Ability to meet continuing education requirements set by the state and the Douglas County Clerk & Recorder's Office.\n·       Ability to meet technical training requirements because of legislation and market demand.\n \nSUPERVISION RECEIVED: \n·       This position receives limited supervision with periodic review of job performance.\n           \nSUPERVISORY RESPONSIBILITIES: \n·       This position assists with supervision of temporary election employees (10-15) during the election cycle.\n·       This position assists with the supervision of Voter Service and Polling Centers.\n \nCONSEQUENCE OF ERROR:\n·       Errors in judgment or failure to achieve results can lead to serious consequences and negatively affect the function of the division, produce negative public perceptions, result in budgetary overrun, flawed decision making by Douglas County, local government entities. \n·       Additional consequences may include non-compliance with Election law and litigation.  \n \n INDEPENDENT JUDGMENT: \n·       This position requires a working knowledge of election processes, election statutes, and office procedures. \n·       Identify opportunities for process and/or productivity improvements and designs and implements changes.\n·       Effectively utilize resources (reports, policies, experience, and job knowledge) to draw logical conclusions to problems.\n·       Decisions are guided by governing statutes and rules, department/division policies, and operating procedures under direction of the Deputy of Elections, Operations Manager, and Lead Elections Specialist.\n \nCONTACTS:\n·       Frequent direct contact with managers, supervisors, other employees, and departments\n·       State, County, Municipal, and Special District Elected Officials\n·       Political Party Chairpersons\n·       Election Managers/Supervisors in other counties\n·       Candidates for Elected Offices\n·       Secretary of State's Office\n·       Vendors\n·       Public\n \nLANGUAGE SKILLS:\n·       Must be able to communicate effectively in both oral and written form, as well as fluently speak, read and write English. \n·       Recognizes and used correct English grammar, punctuation, and spelling, produces written information that is appropriate for the intended audience.\n·       Ability to effectively present ideas and information in a one-on-one and small to medium groups situations.\n \nREASONING ABILITY: \n·       Ability to apply common sense understanding to interpret and carry out a variety of instructions in written, verbal, or diagram form.\n·       Ability to manage and perform a variety of duties, often changing from one task to another of a different nature, without loss of efficiency or composure.\n·       Ability to make judgments or decisions based on available information. \n·       Identifies problems; determines accuracy and relevance of information; uses sound judgment to generate and evaluate alternatives, and to make recommendations.\n \nOTHER SKILLS AND ABILITIES:\n·       Ability to understand, interpret, explain, and comply with election law and Secretary of State rules as they relate to security and election equipment (including but not limited to Title 1 C.R.S, SoS Rules Concerning Elections).\n·       Ability to work effectively both independently and in a team environment is required and utilize initiative to direct own and other's activities.\n·       Ability to manage multiple activities concurrently, allocating time to each according to prioritization is required.\n·       Ability to add, subtracts, multiply and divide into all units of measure, using whole numbers, common fractions and decimals.\n·       Proficient skill levels in most current Microsoft Office Suite, including Outlook, Word, Excel, PowerPoint.\n·       Previous use of SharePoint preferred.\n·       Perform general typing, filing and collating functions.\n·       Competencies in creating, evaluating, and improving business processes.\n·       Excellent analytical, reasoning, and troubleshooting abilities.\n·       Practice and promote teamwork at all levels.\n·       Establish and maintain effective work relationships.\n \nCERTIFICATES, LICENSES, REGISTRATIONS:\n·       Must have and maintain a valid Colorado Driver's License and complying Colorado Insurance.\n·       US citizenship required.\n·       Must pass state and/or national criminal background check annually.\n·       Must currently have Secretary of State Election Certification and maintain certification on a bi-annual basis.\n \nThe ability to successfully complete pre-employment screening that may include but is not limited to: reference checks, criminal background (including fingerprinting through a national database), motor vehicle record search, and drug screen is required.\n \n\n\nPHYSICAL DEMANDS:\n·       Required to stand, walk, sit, talk, hear, and drive. \n·       Specific vision abilities required by this job include vision and the ability to adjust focus. \n·       Occasional heavy lifting 35 pounds or more.\n·       Reasonable accommodations may be made to enable individuals with disabilities to perform the essential functions.\n \nWORK ENVIRONMENT:\n·       Work is generally performed in an office or warehouse environment.\n·       Travel to meetings, conferences, classes and other activities may be required.\n·       Subject to blackout periods for planned time off lasting up to three months at a time. Typically this timeframe may begin 60 days prior to Election Day and may end 30 days past Election Day. Election Deputy, Operations Manager, and/or County Clerk and Recorder, based on workloads and demands, may identify additional blackout periods with little notice.\n·       Extended work hours may be required to include evenings, weekends and holidays.\n·       Must be able to adhere to the established Mission, Vision, and Values of the Clerk and Recorder's Office.\n \nIn the event of an emergency/disaster in or near the County, all County employees are expected to make every effort to be available to assist the County Manager, Elected/Appointed Officials and Department Directors to ensure the continued operation of any and all necessary County functions.  This may mean being available to perform additional duties and hours beyond what is normally required.  In the event that an exempt employee does work more than 40 hours a week in support of County operations during an emergency, such employee may receive overtime or other appropriate wage compensation in accordance with existing County policies or at the discretion of the County.", "skill_categories_required": "ops|vr|legal|personnel|comms", "skill_categories_preferred": "data|pm|gis", "skill_categories_mentioned": "ops|vr|legal|it_cyber|data|pm|personnel|comms|intergovt|gis", "election_security_explicit": false, "degree
